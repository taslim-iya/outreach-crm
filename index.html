<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cambridge ETA Club Management Platform</title>
<meta name="description" content="Premium club management platform for Cambridge ETA." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#07060d;
  --bg-1:#0b0a17;
  --bg-2:#111029;
  --bg-3:#181635;
  --panel:rgba(20,18,44,0.72);
  --panel-2:rgba(28,25,58,0.78);
  --border:rgba(138,99,255,0.18);
  --border-strong:rgba(138,99,255,0.35);
  --text:#e9e6ff;
  --text-dim:#a39ec7;
  --text-muted:#6e6a90;
  --purple:#8a63ff;
  --purple-2:#a98bff;
  --purple-glow:rgba(138,99,255,0.45);
  --violet:#6a3dff;
  --gold:#e8c66b;
  --green:#4ade80;
  --red:#ff6b8a;
  --blue:#5ec8ff;
  --radius:14px;
  --shadow:0 20px 60px -20px rgba(80,40,200,0.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg-0);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  font-size:14px;
  line-height:1.5;
  transition:background 0.3s ease, color 0.3s ease;
}

/* ===== LIGHT THEME ===== */
[data-theme="light"]{
  --bg-0:#ffffff;
  --bg-1:#ffffff;
  --bg-2:#faf9ff;
  --bg-3:#f3efff;
  --panel:#ffffff;
  --panel-2:#fafaff;
  --border:rgba(106,61,255,0.14);
  --border-strong:rgba(106,61,255,0.32);
  --text:#0f0a2c;
  --text-dim:#4e456d;
  --text-muted:#8a84a8;
  --purple:#6a3dff;
  --purple-2:#8a63ff;
  --purple-glow:rgba(106,61,255,0.35);
  --shadow:0 20px 48px -24px rgba(106,61,255,0.25);
}
[data-theme="light"] body::before{
  background:
    radial-gradient(900px 600px at 12% -10%, rgba(138,99,255,0.08), transparent 60%),
    radial-gradient(800px 500px at 100% 0%, rgba(106,61,255,0.06), transparent 60%),
    radial-gradient(600px 400px at 50% 110%, rgba(168,139,255,0.05), transparent 60%);
}
[data-theme="light"] .sidebar{
  background:linear-gradient(180deg,#ffffff,#fafaff);
  border-right:1px solid rgba(106,61,255,0.1);
}
[data-theme="light"] .topbar{background:rgba(255,255,255,0.85)}
[data-theme="light"] .card,
[data-theme="light"] .kpi,
[data-theme="light"] .event-card{
  background:#ffffff;
  box-shadow:0 1px 2px rgba(106,61,255,0.04),0 8px 24px -16px rgba(106,61,255,0.15);
}
[data-theme="light"] .kpi::after{
  background:radial-gradient(circle,rgba(138,99,255,0.12),transparent 70%);
}
[data-theme="light"] .kpi-value{
  -webkit-text-fill-color:initial;background:none;background-clip:unset;
  color:#1a0e4a;
}
[data-theme="light"] .nav-item{color:#4e456d}
[data-theme="light"] .nav-item:hover{background:rgba(106,61,255,0.06);color:#0f0a2c}
[data-theme="light"] .nav-item.active{
  background:linear-gradient(90deg,rgba(106,61,255,0.12),rgba(106,61,255,0.02));
  color:#0f0a2c;
  box-shadow:inset 0 0 0 1px rgba(106,61,255,0.18);
}
[data-theme="light"] .search,
[data-theme="light"] .icon-btn,
[data-theme="light"] .btn-ghost,
[data-theme="light"] .tabs{
  background:#f4f1ff;border-color:rgba(106,61,255,0.14);
}
[data-theme="light"] .search input{color:#0f0a2c}
[data-theme="light"] .task-row{background:#faf9ff}
[data-theme="light"] .task-row:hover{background:#f3efff}
[data-theme="light"] .user-card{background:#f4f1ff}
[data-theme="light"] .input{background:#ffffff;color:#0f0a2c}
[data-theme="light"] .modal{background:#ffffff}
[data-theme="light"] .toast{background:#ffffff;color:#0f0a2c}
[data-theme="light"] .hero{
  background:linear-gradient(135deg,rgba(138,99,255,0.10),rgba(106,61,255,0.03));
}
[data-theme="light"] .table tbody tr:hover{background:rgba(106,61,255,0.05)}
[data-theme="light"] .donut > div{background:#ffffff !important}
[data-theme="light"] .contact-cell .name,
[data-theme="light"] .task-title,
[data-theme="light"] .event-title,
[data-theme="light"] .card-title,
[data-theme="light"] .brand-text .title,
[data-theme="light"] .user-card .name,
[data-theme="light"] .page-title{color:#0f0a2c}
[data-theme="light"] .content::-webkit-scrollbar-thumb{background:rgba(106,61,255,0.18)}

.sidebar,.topbar,.card,.kpi,.event-card,.task-row,.input,.modal,.btn-ghost,.search,.icon-btn,.tabs{
  transition:background 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(900px 600px at 12% -10%, rgba(138,99,255,0.18), transparent 60%),
    radial-gradient(800px 500px at 100% 0%, rgba(106,61,255,0.14), transparent 60%),
    radial-gradient(600px 400px at 50% 110%, rgba(168,139,255,0.10), transparent 60%);
}
h1,h2,h3,h4{font-family:'Space Grotesk','Inter',sans-serif;letter-spacing:-0.01em;font-weight:600}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}

/* ===== LAYOUT ===== */
.app{display:flex;height:100vh;position:relative;z-index:1}
.sidebar{
  width:260px;flex-shrink:0;
  background:linear-gradient(180deg,rgba(15,13,35,0.92),rgba(10,9,22,0.92));
  backdrop-filter:blur(20px);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:22px 16px;
}
.brand{display:flex;align-items:center;gap:12px;padding:6px 10px 22px}
.brand-mark{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,#8a63ff 0%,#6a3dff 50%,#3a1f9e 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk';font-weight:700;font-size:18px;color:white;
  box-shadow:0 8px 24px -4px rgba(138,99,255,0.5),inset 0 1px 0 rgba(255,255,255,0.3);
  position:relative;
}
.brand-mark::after{content:"";position:absolute;inset:2px;border-radius:10px;border:1px solid rgba(255,255,255,0.15)}
.brand-text{display:flex;flex-direction:column;line-height:1.15}
.brand-text .title{font-family:'Space Grotesk';font-weight:700;font-size:15px;color:#fff}
.brand-text .sub{font-size:10.5px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase}

.nav{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);padding:14px 12px 6px;font-weight:600}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 12px;border-radius:10px;
  color:var(--text-dim);font-size:13.5px;font-weight:500;
  cursor:pointer;transition:all 0.2s ease;
  position:relative;
}
.nav-item:hover{background:rgba(138,99,255,0.08);color:var(--text)}
.nav-item.active{
  background:linear-gradient(90deg,rgba(138,99,255,0.22),rgba(138,99,255,0.06));
  color:#fff;
  box-shadow:inset 0 0 0 1px rgba(138,99,255,0.3);
}
.nav-item.active::before{
  content:"";position:absolute;left:-16px;top:50%;transform:translateY(-50%);
  width:3px;height:22px;border-radius:0 3px 3px 0;
  background:linear-gradient(180deg,#a98bff,#6a3dff);
  box-shadow:0 0 12px var(--purple-glow);
}
.nav-item .icon{width:18px;height:18px;opacity:0.9;flex-shrink:0}
.nav-item .badge{margin-left:auto;background:var(--purple);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}

.sidebar-footer{margin-top:auto;padding-top:18px;border-top:1px solid var(--border)}
.user-card{
  display:flex;align-items:center;gap:12px;padding:10px;border-radius:12px;
  background:rgba(138,99,255,0.06);border:1px solid var(--border);
}
.avatar{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#a98bff,#6a3dff);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;color:#fff;font-size:13px;
}
.user-card .name{font-size:12.5px;font-weight:600;color:#fff}
.user-card .role{font-size:10.5px;color:var(--text-muted)}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{
  height:68px;padding:0 32px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:rgba(11,10,23,0.6);backdrop-filter:blur(16px);
  flex-shrink:0;
}
.page-title{font-size:20px;font-weight:700;font-family:'Space Grotesk'}
.page-subtitle{font-size:12.5px;color:var(--text-muted);margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:12px}
.search{
  display:flex;align-items:center;gap:8px;
  background:rgba(138,99,255,0.08);
  border:1px solid var(--border);
  padding:9px 14px;border-radius:10px;min-width:280px;
}
.search input{background:none;border:none;outline:none;color:var(--text);flex:1;font-size:13px}
.search input::placeholder{color:var(--text-muted)}
.icon-btn{
  width:38px;height:38px;border-radius:10px;
  background:rgba(138,99,255,0.08);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;
  position:relative;
}
.icon-btn:hover{background:rgba(138,99,255,0.18);border-color:var(--border-strong)}
.icon-btn .dot{position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red)}

.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;
  transition:all 0.2s;white-space:nowrap;
}
.btn-primary{
  background:linear-gradient(135deg,#8a63ff,#6a3dff);
  color:#fff;
  box-shadow:0 8px 24px -8px rgba(138,99,255,0.6),inset 0 1px 0 rgba(255,255,255,0.2);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 28px -8px rgba(138,99,255,0.8)}
.btn-ghost{background:rgba(138,99,255,0.08);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:rgba(138,99,255,0.16)}

.content{flex:1;overflow-y:auto;padding:28px 32px 40px}
.content::-webkit-scrollbar{width:10px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:rgba(138,99,255,0.2);border-radius:10px}
.content::-webkit-scrollbar-thumb:hover{background:rgba(138,99,255,0.35)}

.section{display:none;animation:fadeUp 0.35s ease}
.section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ===== CARDS ===== */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:22px;
  backdrop-filter:blur(20px);
  position:relative;
  overflow:hidden;
}
.card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(168,139,255,0.4),transparent);
}
.card-title{font-size:15px;font-weight:600;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--text-muted);margin-bottom:18px}

.grid{display:grid;gap:18px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-2-1{grid-template-columns:2fr 1fr}

/* ===== KPI ===== */
.kpi{
  background:linear-gradient(135deg,rgba(20,18,44,0.85),rgba(28,25,58,0.65));
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;position:relative;overflow:hidden;
}
.kpi::after{
  content:"";position:absolute;top:-40px;right:-40px;width:140px;height:140px;
  background:radial-gradient(circle,rgba(138,99,255,0.22),transparent 70%);
  border-radius:50%;
}
.kpi-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;font-weight:600}
.kpi-value{font-size:32px;font-weight:700;font-family:'Space Grotesk';margin-top:8px;background:linear-gradient(135deg,#fff,#c4b8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.kpi-meta{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:12px;color:var(--text-dim)}
.kpi-trend{display:inline-flex;align-items:center;gap:3px;font-weight:600;padding:2px 8px;border-radius:8px;font-size:11px}
.trend-up{background:rgba(74,222,128,0.12);color:var(--green)}
.trend-down{background:rgba(255,107,138,0.12);color:var(--red)}
.kpi-icon{
  position:absolute;top:18px;right:18px;z-index:1;
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,rgba(138,99,255,0.3),rgba(106,61,255,0.15));
  border:1px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;
}

/* ===== TABLES ===== */
.table{width:100%;border-collapse:collapse}
.table th{
  text-align:left;padding:12px 14px;font-size:11px;font-weight:600;
  color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;
  border-bottom:1px solid var(--border);
}
.table td{padding:14px;font-size:13px;border-bottom:1px solid rgba(138,99,255,0.08)}
.table tr{transition:background 0.15s}
.table tbody tr:hover{background:rgba(138,99,255,0.06)}
.table tr:last-child td{border-bottom:none}

.tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;
  background:rgba(138,99,255,0.14);color:var(--purple-2);
  border:1px solid rgba(138,99,255,0.25);
}
.tag.green{background:rgba(74,222,128,0.12);color:var(--green);border-color:rgba(74,222,128,0.3)}
.tag.gold{background:rgba(232,198,107,0.12);color:var(--gold);border-color:rgba(232,198,107,0.3)}
.tag.red{background:rgba(255,107,138,0.12);color:var(--red);border-color:rgba(255,107,138,0.3)}
.tag.blue{background:rgba(94,200,255,0.12);color:var(--blue);border-color:rgba(94,200,255,0.3)}

.contact-cell{display:flex;align-items:center;gap:11px}
.contact-cell .avatar{width:34px;height:34px;font-size:12px;border-radius:9px}
.contact-cell .info{display:flex;flex-direction:column}
.contact-cell .name{font-weight:600;color:#fff;font-size:13px}
.contact-cell .email{font-size:11.5px;color:var(--text-muted)}

/* ===== EVENTS ===== */
.event-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;
  position:relative;overflow:hidden;transition:all 0.25s;
}
.event-card:hover{transform:translateY(-2px);border-color:var(--border-strong);box-shadow:var(--shadow)}
.event-card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#8a63ff,#a98bff,#6a3dff);
}
.event-date{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
  font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;
}
.event-title{font-size:17px;font-weight:700;font-family:'Space Grotesk';margin-bottom:8px}
.event-desc{font-size:12.5px;color:var(--text-dim);line-height:1.55;margin-bottom:16px}
.event-foot{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--border)}
.attendees{display:flex;align-items:center}
.attendees .avatar{width:26px;height:26px;font-size:10px;border-radius:7px;border:2px solid var(--bg-1);margin-left:-8px}
.attendees .avatar:first-child{margin-left:0}
.attendees .more{margin-left:-8px;width:26px;height:26px;border-radius:7px;border:2px solid var(--bg-1);background:rgba(138,99,255,0.2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--purple-2)}

/* ===== TASKS ===== */
.task-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;border-radius:10px;
  background:rgba(138,99,255,0.04);border:1px solid var(--border);
  margin-bottom:10px;transition:all 0.2s;
}
.task-row:hover{background:rgba(138,99,255,0.09);border-color:var(--border-strong)}
.task-row.done{opacity:0.55}
.task-row.done .task-title{text-decoration:line-through}
.checkbox{
  width:20px;height:20px;border-radius:6px;flex-shrink:0;
  border:1.5px solid rgba(138,99,255,0.4);
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;
}
.checkbox:hover{border-color:var(--purple-2)}
.checkbox.checked{background:linear-gradient(135deg,#8a63ff,#6a3dff);border-color:#8a63ff}
.checkbox.checked::after{content:"";width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) translate(-1px,-1px)}
.task-info{flex:1;min-width:0}
.task-title{font-size:13.5px;font-weight:600;color:#fff}
.task-meta{font-size:11.5px;color:var(--text-muted);margin-top:3px;display:flex;gap:12px;align-items:center}

/* ===== FORMS & MODAL ===== */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;font-weight:600}
.input,select.input,textarea.input{
  width:100%;padding:11px 14px;border-radius:10px;
  background:rgba(10,9,22,0.6);border:1px solid var(--border);
  color:var(--text);font-size:13px;outline:none;transition:all 0.2s;
}
.input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(138,99,255,0.18)}

.modal-back{
  position:fixed;inset:0;background:rgba(5,4,15,0.75);backdrop-filter:blur(8px);
  z-index:100;display:none;align-items:center;justify-content:center;padding:20px;
}
.modal-back.open{display:flex;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:linear-gradient(180deg,#13112b,#0d0c1f);
  border:1px solid var(--border-strong);
  border-radius:18px;padding:28px;width:100%;max-width:500px;
  box-shadow:var(--shadow);position:relative;
  max-height:90vh;overflow-y:auto;
}
.modal h3{font-size:18px;margin-bottom:6px}
.modal-sub{font-size:12.5px;color:var(--text-muted);margin-bottom:22px}
.modal-close{position:absolute;top:18px;right:18px;width:32px;height:32px;border-radius:8px;background:rgba(138,99,255,0.1)}
.modal-close:hover{background:rgba(138,99,255,0.2)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;padding-top:18px;border-top:1px solid var(--border)}

/* ===== CHARTS ===== */
.bar-chart{display:flex;align-items:flex-end;gap:10px;height:180px;padding:10px 0}
.bar{
  flex:1;border-radius:6px 6px 0 0;
  background:linear-gradient(180deg,#a98bff,#6a3dff);
  position:relative;min-height:6px;
  transition:all 0.3s;
}
.bar:hover{filter:brightness(1.2)}
.bar-label{position:absolute;bottom:-22px;left:0;right:0;text-align:center;font-size:10.5px;color:var(--text-muted)}
.bar-value{position:absolute;top:-20px;left:0;right:0;text-align:center;font-size:10.5px;color:var(--purple-2);font-weight:600}

.donut{position:relative;width:180px;height:180px;margin:0 auto}
.legend{display:flex;flex-direction:column;gap:8px;margin-top:18px}
.legend-item{display:flex;align-items:center;gap:10px;font-size:12px}
.legend-dot{width:10px;height:10px;border-radius:3px}

/* ===== MISC ===== */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:200;
  background:linear-gradient(135deg,#1a1638,#0f0c26);
  border:1px solid var(--border-strong);border-radius:12px;
  padding:14px 18px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:12px;
  transform:translateX(400px);transition:transform 0.3s ease;
  max-width:340px;
}
.toast.show{transform:translateX(0)}
.toast-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#8a63ff,#6a3dff);display:flex;align-items:center;justify-content:center;flex-shrink:0}

.empty{padding:40px 20px;text-align:center;color:var(--text-muted);font-size:13px}

.hero{
  background:linear-gradient(135deg,rgba(138,99,255,0.14),rgba(106,61,255,0.06));
  border:1px solid var(--border-strong);
  border-radius:18px;padding:28px 32px;margin-bottom:24px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:"";position:absolute;top:-60px;right:-60px;width:260px;height:260px;
  background:radial-gradient(circle,rgba(168,139,255,0.28),transparent 65%);border-radius:50%;
}
.hero h1{font-size:26px;font-family:'Space Grotesk';margin-bottom:6px;position:relative}
.hero p{font-size:13px;color:var(--text-dim);max-width:560px;position:relative}
.hero-actions{display:flex;gap:10px;margin-top:18px;position:relative}

.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.section-head h2{font-size:17px}
.tabs{display:flex;gap:4px;background:rgba(138,99,255,0.06);padding:4px;border-radius:10px;border:1px solid var(--border)}
.tab{padding:8px 14px;border-radius:7px;font-size:12px;font-weight:600;color:var(--text-dim);cursor:pointer;transition:all 0.2s}
.tab.active{background:linear-gradient(135deg,#8a63ff,#6a3dff);color:#fff;box-shadow:0 4px 12px -4px rgba(138,99,255,0.6)}

/* ===== USER SWITCHER ===== */
.user-switcher{position:relative}
.user-chip{
  display:flex;align-items:center;gap:10px;
  padding:6px 12px 6px 6px;border-radius:10px;
  background:rgba(138,99,255,0.08);border:1px solid var(--border);
  transition:all 0.2s;max-width:200px;
}
.user-chip:hover{background:rgba(138,99,255,0.16);border-color:var(--border-strong)}
.user-chip .avatar{width:30px;height:30px;font-size:11px;border-radius:8px;flex-shrink:0}
.chip-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.chip-role{font-size:10px;color:var(--text-muted);white-space:nowrap}
.user-menu{
  position:absolute;top:calc(100% + 8px);right:0;min-width:280px;z-index:50;
  background:linear-gradient(180deg,#13112b,#0d0c1f);
  border:1px solid var(--border-strong);border-radius:12px;
  box-shadow:var(--shadow);
  padding:8px;display:none;
}
[data-theme="light"] .user-menu{background:#ffffff}
.user-menu.open{display:block;animation:fadeUp 0.2s ease}
.user-menu-label{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);padding:10px 12px 6px;font-weight:600}
.user-menu-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:8px;cursor:pointer;transition:background 0.15s;
}
.user-menu-item:hover{background:rgba(138,99,255,0.1)}
.user-menu-item .avatar{width:32px;height:32px;font-size:11px;border-radius:8px}
.user-menu-item .info{flex:1;min-width:0}
.user-menu-item .name{font-size:12.5px;font-weight:600;color:var(--text)}
.user-menu-item .role{font-size:10.5px;color:var(--text-muted)}
.user-menu-item.current{background:linear-gradient(90deg,rgba(138,99,255,0.18),rgba(138,99,255,0.04))}
.user-menu-item .check{color:var(--purple-2);opacity:0;transition:opacity 0.2s}
.user-menu-item.current .check{opacity:1}

/* ===== NOTES ===== */
.note-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 20px;
  position:relative;transition:all 0.2s;
}
.note-card:hover{border-color:var(--border-strong);transform:translateY(-1px);box-shadow:var(--shadow)}
.note-card.direct{border-left:3px solid #a98bff}
.note-card.private{border-left:3px solid var(--gold)}
.note-card.public{border-left:3px solid var(--green)}
.note-card.pinned::after{
  content:"";position:absolute;top:14px;right:16px;width:8px;height:8px;border-radius:50%;
  background:linear-gradient(135deg,#a98bff,#6a3dff);box-shadow:0 0 10px var(--purple-glow);
}
.note-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.note-head .avatar{width:28px;height:28px;font-size:10px;border-radius:7px}
.note-author{font-size:12px;font-weight:600;color:var(--text)}
.note-meta{font-size:11px;color:var(--text-muted);margin-left:auto}
.note-title{font-size:14.5px;font-weight:700;margin-bottom:8px;font-family:'Space Grotesk';color:var(--text)}
.note-body{font-size:12.5px;color:var(--text-dim);line-height:1.6;white-space:pre-wrap}
.note-foot{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}

/* ===== TEAM PROGRESS ===== */
.progress-bar{
  height:6px;background:rgba(138,99,255,0.12);border-radius:6px;overflow:hidden;flex:1;
}
.progress-fill{
  height:100%;background:linear-gradient(90deg,#a98bff,#6a3dff);
  border-radius:6px;transition:width 0.6s ease;
  box-shadow:0 0 12px rgba(138,99,255,0.4);
}
.team-row{
  display:flex;align-items:center;gap:16px;padding:14px 0;
  border-bottom:1px solid var(--border);
}
.team-row:last-child{border-bottom:none}

@media (max-width:1100px){
  .grid-4{grid-template-columns:repeat(2,1fr)}

  .brand-text,.nav-label,.nav-item span:not(.badge),.user-card .info{display:none}
  .nav-item{justify-content:center}
  .search{min-width:160px}
}
</style>
</head>

<script>
// ===== STATE =====
const state = {
  section: 'dashboard',

  users: [
    {id:'u1', name:'Taslim Iya',        email:'taslim@cambridge-eta.co.uk',  role:'Owner',       permissions:['*']},

  notes: [
    {id:'n1', authorId:'u1', targetUserId:'u2', visibility:'direct',  title:'Summit keynote priority',         content:'Priya — please lock Sarah Chen before Friday. We need three keynotes confirmed ahead of the printed programme deadline.', createdAt:'2026-04-10', pinned:true},

    {id:'n3', authorId:'u1', targetUserId:'u4', visibility:'direct',  title:'Spring cohort onboarding',        content:'Sofia — induction packs should land this week. Double-check mentor pairings against the updated matrix.', createdAt:'2026-04-08', pinned:false},

    {id:'n6', authorId:'u2', targetUserId:null, visibility:'private', title:'Personal follow-ups',             content:'- Ping Alex about the investor panel slot\n- Check catering numbers with Priya\n- Confirm Judge AV booking',  createdAt:'2026-04-11', pinned:false},
    {id:'n7', authorId:'u3', targetUserId:null, visibility:'public',  title:'Expenses policy reminder',        content:'Please submit expense claims within 14 days of the event. Anything older may be deferred to next term.', createdAt:'2026-04-05', pinned:false},
  ],
  members: [
    {id:1, name:'Alex Thornton', email:'alex.t@cambridge-eta.co.uk', role:'Investor', chapter:'Jesus College', tier:'Platinum', status:'Active', joined:'2023-10-12'},
    {id:2, name:'Priya Raghavan', email:'priya.r@cambridge-eta.co.uk', role:'Founder', chapter:'Trinity', tier:'Gold', status:'Active', joined:'2024-01-08'},
    {id:3, name:'Marcus Weatherby', email:'m.weatherby@cambridge-eta.co.uk', role:'Mentor', chapter:'Kings', tier:'Platinum', status:'Active', joined:'2022-09-21'},

    {id:5, name:'Daniel Osei', email:'d.osei@cambridge-eta.co.uk', role:'Advisor', chapter:'St Johns', tier:'Gold', status:'Active', joined:'2023-03-14'},
    {id:6, name:'Emma Lindqvist', email:'e.lindqvist@cambridge-eta.co.uk', role:'Founder', chapter:'Pembroke', tier:'Silver', status:'Active', joined:'2024-06-19'},
    {id:7, name:'Rohan Mehta', email:'r.mehta@cambridge-eta.co.uk', role:'Investor', chapter:'Jesus College', tier:'Platinum', status:'Active', joined:'2021-11-01'},
    {id:8, name:'Yuki Tanaka', email:'y.tanaka@cambridge-eta.co.uk', role:'Searcher', chapter:'Queens', tier:'Gold', status:'Active', joined:'2024-02-27'},
  ],
  events: [

    {id:3, title:'Founders Fireside: Lessons from Exit', date:'2026-04-30', time:'19:00', venue:'Trinity College, Old Combination Room', desc:'Intimate fireside with three ETA operators who recently exited. Invite-only for active searchers.', attendees:18, capacity:30, status:'Open'},
    {id:4, title:'Investor Roundtable Q2', date:'2026-05-07', time:'12:30', venue:'Kings Parade, Private Dining', desc:'Quarterly roundtable with LPs, family offices and sponsor funds active in the ETA ecosystem.', attendees:31, capacity:40, status:'Open'},
    {id:5, title:'Cambridge ETA Black Tie Dinner', date:'2026-06-20', time:'19:30', venue:'The Pitt Building', desc:'Our signature annual black-tie gala celebrating the cohort, with a keynote from a world-class CEO.', attendees:86, capacity:200, status:'Open'},

  ],
  tasks: [

    {id:8, title:'Renew Judge Business School booking',         due:'2026-04-12', priority:'High',   assigneeId:'u1', done:true,  project:'Deal Workshop'},

  ],
};

// ===== HELPERS =====
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const fmtDate = (s) => {
  const d = new Date(s);
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
};
const shortDate = (s) => {
  const d = new Date(s);
  return {day:d.getDate(), month:d.toLocaleDateString('en-GB',{month:'short'}).toUpperCase(), weekday:d.toLocaleDateString('en-GB',{weekday:'short'}).toUpperCase()};
};
const initials = (n) => n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const esc = (s) => String(s).replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

// ===== USERS / PERMISSIONS =====
function currentUser(){ return state.users.find(u=>u.id===state.currentUserId) || state.users[0]; }
function isOwner(){ return currentUser().role==='Owner'; }
function userById(id){ return state.users.find(u=>u.id===id); }
function userName(id){ const u = userById(id); return u ? u.name : 'Unassigned'; }
function canAccess(section){
  const u = currentUser();
  if(u.permissions.includes('*')) return true;
  return u.permissions.includes(section);
}
function visibleTasks(){
  if(isOwner()) return state.tasks;
  return state.tasks.filter(t=>t.assigneeId===state.currentUserId);
}
function notesForMe(){
  const me = state.currentUserId;
  return state.notes.filter(n=>n.visibility==='direct' && n.targetUserId===me);
}
function notesMyOwn(){
  return state.notes.filter(n=>n.authorId===state.currentUserId);
}
function notesTeamPublic(){
  return state.notes.filter(n=>n.visibility==='public');
}

function toast(title, msg){
  $('#toastTitle').textContent = title;
  $('#toastMsg').textContent = msg;
  const t = $('#toast'); t.classList.add('show');
  clearTimeout(window._tt); window._tt = setTimeout(()=>t.classList.remove('show'), 2600);
}

function openModal(html){ $('#modalBody').innerHTML = html; $('#modalBack').classList.add('open'); }
function closeModal(){ $('#modalBack').classList.remove('open'); }
$('#modalBack').addEventListener('click', e=>{ if(e.target.id==='modalBack') closeModal(); });

  cal: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a98bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  check: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a98bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>',
  trend: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a98bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',
};

<script>
// ===== DASHBOARD =====
function renderDashboard(){
  const me = currentUser();
  const owner = isOwner();
  const totalMembers = state.members.length;
  const activeMembers = state.members.filter(m=>m.status==='Active').length;
  const upcoming = state.events.length;
  const myTasks = visibleTasks();
  const openTasks = (owner ? state.tasks : myTasks).filter(t=>!t.done).length;

  const eventSorted = [...state.events].sort((a,b)=> new Date(a.date)-new Date(b.date)).slice(0,3);
  const recentMembers = [...state.members].slice(-4).reverse();

  const chartData = [
    {label:'Jan',v:62},{label:'Feb',v:74},{label:'Mar',v:81},{label:'Apr',v:95},
    {label:'May',v:88},{label:'Jun',v:112},{label:'Jul',v:128}
  ];
  const max = Math.max(...chartData.map(d=>d.v));
  const bars = chartData.map(d=>`
    <div class="bar" style="height:${(d.v/max)*100}%">
      <div class="bar-value">${d.v}</div>
      <div class="bar-label">${d.label}</div>
    </div>`).join('');

  const tierCounts = state.members.reduce((a,m)=>{a[m.tier]=(a[m.tier]||0)+1;return a;},{});
  const tierColors = {Platinum:'#a98bff', Gold:'#e8c66b', Silver:'#8a94b8'};
  const tierTotal = Object.values(tierCounts).reduce((a,b)=>a+b,0);
  let acc = 0;
  const segs = Object.entries(tierCounts).map(([k,v])=>{
    const pct = (v/tierTotal)*100;
    const s = `${k}|${acc}|${acc+pct}|${tierColors[k]}`;
    acc += pct; return s;
  });
  const grads = segs.map(s=>{
    const [,from,to,color] = s.split('|');
    return `${color} ${from}% ${to}%`;
  }).join(',');

  const firstName = me.name.split(' ')[0];
  const heroDesc = owner
    ? `Here is your command centre for the Cambridge ETA Club. ${openTasks} open tasks across the team, ${upcoming} upcoming events, and a steadily growing cohort.`
    : `Welcome back. You have ${openTasks} open tasks assigned to you and ${notesForMe().length} note${notesForMe().length===1?'':'s'} from leadership waiting for you.`;

  // Team progress (owner only)
  const teamProgress = owner ? `
    <div class="card" style="margin-bottom:24px">
      <div class="section-head">
        <div><div class="card-title">Team progress</div><div class="card-sub">Live view of each team member's workload</div></div>
        <button class="btn btn-ghost" onclick="switchSection('team')">Manage team</button>
      </div>
      ${state.users.filter(u=>u.role!=='Owner').map(u=>{
        const theirs = state.tasks.filter(t=>t.assigneeId===u.id);
        const doneCount = theirs.filter(t=>t.done).length;
        const pct = theirs.length ? Math.round(doneCount/theirs.length*100) : 0;
        return `
        <div class="team-row">
          <div class="avatar">${initials(u.name)}</div>
          <div style="min-width:160px">
            <div style="font-size:13px;font-weight:600;color:var(--text)">${esc(u.name)}</div>
            <div style="font-size:11px;color:var(--text-muted)">${esc(u.role)}</div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div style="font-size:12px;color:var(--text-dim);min-width:90px;text-align:right">${doneCount}/${theirs.length} tasks</div>
          <span class="tag ${pct>=75?'green':pct>=40?'gold':'red'}">${pct}%</span>
        </div>`;
      }).join('')}
    </div>
  ` : '';

  $('#section-dashboard').innerHTML = `
    <div class="hero">
      <h1>Welcome back, ${esc(firstName)}</h1>
      <p>${heroDesc}</p>
      <div class="hero-actions">
        ${owner ? '<button class="btn btn-primary" onclick="switchSection(\'events\')">Plan an event</button><button class="btn btn-ghost" onclick="switchSection(\'team\')">Manage team</button>' : '<button class="btn btn-primary" onclick="switchSection(\'tasks\')">View my tasks</button><button class="btn btn-ghost" onclick="switchSection(\'notes\')">Read notes</button>'}
      </div>
    </div>

    <div class="grid grid-4" style="margin-bottom:24px">
      <div class="kpi">
        <div class="kpi-icon">${ICONS.users}</div>
        <div class="kpi-label">Total Members</div>
        <div class="kpi-value">${totalMembers}</div>
        <div class="kpi-meta"><span class="kpi-trend trend-up">+12%</span> vs last term</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">${ICONS.check}</div>
        <div class="kpi-label">Active</div>
        <div class="kpi-value">${activeMembers}</div>
        <div class="kpi-meta"><span class="kpi-trend trend-up">+4</span> this month</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">${ICONS.cal}</div>
        <div class="kpi-label">Events Scheduled</div>
        <div class="kpi-value">${upcoming}</div>
        <div class="kpi-meta"><span class="kpi-trend trend-up">+2</span> since April</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">${ICONS.trend}</div>
        <div class="kpi-label">Engagement</div>
        <div class="kpi-value">94%</div>
        <div class="kpi-meta"><span class="kpi-trend trend-up">+6%</span> event attendance</div>
      </div>
    </div>

    ${teamProgress}

    <div class="grid grid-2-1" style="margin-bottom:24px">
      <div class="card">
        <div class="section-head">
          <div>
            <div class="card-title">Membership growth</div>
            <div class="card-sub">New and renewing members · 7 months trailing</div>
          </div>
          <div class="tabs"><div class="tab active">Monthly</div><div class="tab">Quarterly</div></div>
        </div>
        <div class="bar-chart">${bars}</div>
        <div style="height:20px"></div>
      </div>
      <div class="card">
        <div class="card-title">Membership tiers</div>
        <div class="card-sub">Distribution across the cohort</div>
        <div class="donut" style="background:conic-gradient(${grads});border-radius:50%">
          <div style="position:absolute;inset:22px;background:var(--bg-1);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <div style="font-size:26px;font-weight:700;font-family:'Space Grotesk'">${tierTotal}</div>
            <div style="font-size:10.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em">Members</div>
          </div>
        </div>
        <div class="legend">
          ${Object.entries(tierCounts).map(([k,v])=>`
            <div class="legend-item">
              <div class="legend-dot" style="background:${tierColors[k]}"></div>
              <span style="flex:1">${k}</span>
              <span style="color:var(--text-muted)">${v}</span>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="grid grid-2" style="margin-bottom:24px">
      <div class="card">
        <div class="section-head">
          <div><div class="card-title">Upcoming events</div><div class="card-sub">Next three in your calendar</div></div>
          <button class="btn btn-ghost" onclick="switchSection('events')">View all</button>
        </div>
        ${eventSorted.map(e=>{
          const d = shortDate(e.date);
          return `
          <div style="display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)">
            <div style="width:54px;height:54px;border-radius:10px;background:linear-gradient(135deg,rgba(138,99,255,0.25),rgba(106,61,255,0.1));border:1px solid var(--border-strong);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
              <div style="font-size:9.5px;color:var(--purple-2);font-weight:700;letter-spacing:0.06em">${d.month}</div>
              <div style="font-size:18px;font-weight:700;font-family:'Space Grotesk'">${d.day}</div>
            </div>
            <div style="flex:1;min-width:0">
              <div style="font-size:13.5px;font-weight:600;color:#fff">${esc(e.title)}</div>
              <div style="font-size:11.5px;color:var(--text-muted);margin-top:3px">${esc(e.venue)} · ${e.time}</div>
              <div style="margin-top:6px"><span class="tag">${e.attendees}/${e.capacity} attending</span></div>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div class="card">
        <div class="section-head">
          <div><div class="card-title">Recent members</div><div class="card-sub">Latest additions to the club</div></div>
          <button class="btn btn-ghost" onclick="switchSection('crm')">View all</button>
        </div>
        ${recentMembers.map(m=>`
          <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
            <div class="avatar">${initials(m.name)}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:600;color:#fff">${esc(m.name)}</div>
              <div style="font-size:11.5px;color:var(--text-muted)">${esc(m.role)} · ${esc(m.chapter)}</div>
            </div>
            <span class="tag ${m.tier==='Platinum'?'':m.tier==='Gold'?'gold':'blue'}">${m.tier}</span>
          </div>`).join('')}
      </div>
    </div>
  `;
}

// ===== EVENTS =====
function renderEvents(){
  const cards = state.events.map(e=>{
    const d = shortDate(e.date);
    const statusClass = e.status==='Nearly Full'?'gold':'green';
    return `
    <div class="event-card">
      <div class="event-date">
        <div style="display:flex;flex-direction:column;padding:6px 10px;border-radius:8px;background:rgba(138,99,255,0.12);border:1px solid var(--border);min-width:50px;text-align:center">
          <div style="font-size:9px;color:var(--purple-2);font-weight:700">${d.month}</div>
          <div style="font-size:15px;font-weight:700;color:#fff;font-family:'Space Grotesk'">${d.day}</div>
        </div>
        <span>${d.weekday} · ${e.time}</span>
      </div>
      <div class="event-title">${esc(e.title)}</div>
      <div class="event-desc">${esc(e.desc)}</div>
      <div style="display:flex;gap:8px;margin-bottom:12px;font-size:11.5px;color:var(--text-muted)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>${esc(e.venue)}</span>
      </div>
      <div class="event-foot">
        <div class="attendees">
          ${state.members.slice(0,4).map(m=>`<div class="avatar">${initials(m.name)}</div>`).join('')}
          <div class="more">+${Math.max(0,e.attendees-4)}</div>
        </div>
        <span class="tag ${statusClass}">${e.status}</span>
      </div>
    </div>`;
  }).join('');

  $('#section-events').innerHTML = `
    <div class="section-head">
      <div>
        <h2>Upcoming events</h2>
        <div style="font-size:12.5px;color:var(--text-muted);margin-top:3px">${state.events.length} events in your pipeline</div>
      </div>
      <div class="tabs">
        <div class="tab active">All</div>
        <div class="tab">This week</div>
        <div class="tab">This month</div>
      </div>
    </div>
    <div class="grid grid-3">${cards}</div>
  `;
}
</script>

<script>
// ===== TASKS =====
function renderTasks(){
  const owner = isOwner();
  const scope = visibleTasks();
  const pending = scope.filter(t=>!t.done);
  const done = scope.filter(t=>t.done);
  const highP = pending.filter(t=>t.priority==='High').length;

  const taskRow = (t) => {
    const prioClass = t.priority==='High'?'red':t.priority==='Medium'?'gold':'blue';
    return `
    <div class="task-row ${t.done?'done':''}">
      <div class="checkbox ${t.done?'checked':''}" onclick="toggleTask(${t.id})"></div>
      <div class="task-info">
        <div class="task-title">${esc(t.title)}</div>
        <div class="task-meta">
          <span>${fmtDate(t.due)}</span>
          <span>·</span>
          <span>${esc(userName(t.assigneeId))}</span>
          <span>·</span>
          <span>${esc(t.project)}</span>
        </div>
      </div>
      <span class="tag ${prioClass}">${t.priority}</span>
    </div>`;
  };

  const ownersCount = new Set(scope.map(t=>t.assigneeId)).size;
  const cardSub = owner ? 'Everything your team is working on' : 'Tasks assigned to you';

  $('#section-tasks').innerHTML = `
    <div class="grid grid-4" style="margin-bottom:24px">
      <div class="kpi"><div class="kpi-label">${owner?'Open':'My open'}</div><div class="kpi-value">${pending.length}</div><div class="kpi-meta">${highP} high priority</div></div>
      <div class="kpi"><div class="kpi-label">Completed</div><div class="kpi-value">${done.length}</div><div class="kpi-meta">this cycle</div></div>
      <div class="kpi"><div class="kpi-label">Due this week</div><div class="kpi-value">${pending.filter(t=>{const d=new Date(t.due);const n=new Date();return (d-n)/(1000*60*60*24)<=7;}).length}</div><div class="kpi-meta">next 7 days</div></div>
      <div class="kpi"><div class="kpi-label">${owner?'Assignees':'Project'}</div><div class="kpi-value">${owner?ownersCount:new Set(scope.map(t=>t.project)).size}</div><div class="kpi-meta">${owner?'active contributors':'workstreams'}</div></div>
    </div>

    <div class="card">
      <div class="section-head">
        <div><div class="card-title">${owner?'Open tasks':'My open tasks'}</div><div class="card-sub">${cardSub}</div></div>
        <div class="tabs"><div class="tab active">All</div><div class="tab">High</div></div>
      </div>
      ${pending.map(taskRow).join('') || '<div class="empty">Nothing pending. Nice work.</div>'}
    </div>

    <div class="card" style="margin-top:24px">
      <div class="card-title">Completed</div>
      <div class="card-sub">Closed out recently</div>
      ${done.map(taskRow).join('') || '<div class="empty">Nothing completed yet.</div>'}
    </div>
  `;
}

// ===== NOTES =====
let notesTab = 'forme';
function renderNotes(){
  const owner = isOwner();
  const forMe = notesForMe();
  const mine = notesMyOwn();
  const team = notesTeamPublic();
  const pinnedForMe = forMe.filter(n=>n.pinned).length;

  const noteCard = (n) => {
    const a = userById(n.authorId);
    const target = n.targetUserId ? userById(n.targetUserId) : null;
    const visLabel = n.visibility==='direct' ? (target ? `to ${target.name}` : 'direct')
                    : n.visibility==='public' ? 'team public'
                    : 'private';
    const visClass = n.visibility;
    return `
    <div class="note-card ${visClass}${n.pinned?' pinned':''}">
      <div class="note-head">
        <div class="avatar">${initials(a.name)}</div>
        <div>
          <div class="note-author">${esc(a.name)}</div>
          <div style="font-size:10.5px;color:var(--text-muted)">${esc(a.role)}</div>
        </div>
        <div class="note-meta">${fmtDate(n.createdAt)}</div>
      </div>
      <div class="note-title">${esc(n.title)}</div>
      <div class="note-body">${esc(n.content)}</div>
      <div class="note-foot">
        <span class="tag ${n.visibility==='public'?'green':n.visibility==='private'?'gold':''}">${visLabel}</span>
        ${n.authorId===state.currentUserId ? `<button class="btn btn-ghost" style="margin-left:auto;padding:6px 12px;font-size:11px" onclick="deleteNote('${n.id}')">Delete</button>` : ''}
      </div>
    </div>`;
  };

  const lists = {
    forme: forMe,
    mine: mine,
    team: team,
  };
  const active = lists[notesTab];
  const emptyMsg = {
    forme: 'No direct notes yet. When leadership shares guidance with you, it appears here.',
    mine: 'You have not written any notes yet. Create one with the button above.',
    team: 'No public team notes yet.',
  }[notesTab];

  $('#section-notes').innerHTML = `
    <div class="grid grid-4" style="margin-bottom:24px">
      <div class="kpi"><div class="kpi-label">For me</div><div class="kpi-value">${forMe.length}</div><div class="kpi-meta">${pinnedForMe} pinned</div></div>
      <div class="kpi"><div class="kpi-label">My notes</div><div class="kpi-value">${mine.length}</div><div class="kpi-meta">${mine.filter(n=>n.visibility==='private').length} private</div></div>
      <div class="kpi"><div class="kpi-label">Team public</div><div class="kpi-value">${team.length}</div><div class="kpi-meta">visible to everyone</div></div>
      <div class="kpi"><div class="kpi-label">Authors</div><div class="kpi-value">${new Set(state.notes.map(n=>n.authorId)).size}</div><div class="kpi-meta">people sharing</div></div>
    </div>

    <div class="section-head">
      <div>
        <h2>Notes</h2>
        <div style="font-size:12.5px;color:var(--text-muted);margin-top:3px">Private, public and direct notes across the team</div>
      </div>
      <div class="tabs">
        <div class="tab ${notesTab==='forme'?'active':''}" onclick="switchNotesTab('forme')">For me <span style="opacity:0.6">(${forMe.length})</span></div>
        <div class="tab ${notesTab==='mine'?'active':''}" onclick="switchNotesTab('mine')">My notes <span style="opacity:0.6">(${mine.length})</span></div>
        <div class="tab ${notesTab==='team'?'active':''}" onclick="switchNotesTab('team')">Team <span style="opacity:0.6">(${team.length})</span></div>
      </div>
    </div>

    <div class="grid grid-2">
      ${active.length ? active.map(noteCard).join('') : `<div class="card" style="grid-column:1/-1"><div class="empty">${emptyMsg}</div></div>`}
    </div>
  `;

  // badge
  const badge = $('#notesBadge');
  if(forMe.length){ badge.style.display='inline-block'; badge.textContent=forMe.length; }
  else { badge.style.display='none'; }
}
function switchNotesTab(t){ notesTab = t; renderNotes(); }
function deleteNote(id){
  state.notes = state.notes.filter(n=>n.id!==id);
  renderNotes();
  toast('Note deleted','Removed from your notes');
}

// ===== TEAM =====
function renderTeam(){
  if(!isOwner()){
    $('#section-team').innerHTML = `<div class="card"><div class="empty">Only the Owner can manage the team. Switch user from the topbar to see this view.</div></div>`;
    return;
  }
  const PERM_OPTIONS = ['dashboard','events','tasks','crm','notes'];
  const rows = state.users.map(u=>{
    const theirs = state.tasks.filter(t=>t.assigneeId===u.id);
    const doneCount = theirs.filter(t=>t.done).length;
    const overdue = theirs.filter(t=>!t.done && new Date(t.due) < new Date()).length;
    const pct = theirs.length ? Math.round(doneCount/theirs.length*100) : 0;
    const isO = u.role==='Owner';
    const perms = isO ? '<span class="tag">Full access</span>' :
      PERM_OPTIONS.map(p=>{
        const has = u.permissions.includes(p);
        return `<span class="tag ${has?'green':'red'}" style="cursor:pointer" onclick="togglePerm('${u.id}','${p}')">${has?'':'—'} ${p}</span>`;
      }).join(' ');
    return `
    <tr>
      <td>
        <div class="contact-cell">
          <div class="avatar">${initials(u.name)}</div>
          <div class="info">
            <div class="name">${esc(u.name)}</div>
            <div class="email">${esc(u.email)}</div>
          </div>
        </div>
      </td>
      <td>${esc(u.role)}</td>
      <td style="min-width:280px">${perms}</td>
      <td style="min-width:180px">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="progress-bar" style="min-width:90px"><div class="progress-fill" style="width:${pct}%"></div></div>
          <span style="font-size:11.5px;color:var(--text-muted)">${doneCount}/${theirs.length}</span>
        </div>
      </td>
      <td>${overdue>0?`<span class="tag red">${overdue} overdue</span>`:`<span class="tag green">on track</span>`}</td>
      <td>
        <button class="btn btn-ghost" style="padding:6px 12px;font-size:11px" onclick="writeNoteTo('${u.id}')">${isO?'Note':'Write note'}</button>
      </td>
    </tr>`;
  }).join('');

  $('#section-team').innerHTML = `
    <div class="grid grid-4" style="margin-bottom:24px">
      <div class="kpi"><div class="kpi-label">Team size</div><div class="kpi-value">${state.users.length}</div><div class="kpi-meta">active members</div></div>
      <div class="kpi"><div class="kpi-label">Tasks assigned</div><div class="kpi-value">${state.tasks.length}</div><div class="kpi-meta">${state.tasks.filter(t=>!t.done).length} open</div></div>
      <div class="kpi"><div class="kpi-label">Completion</div><div class="kpi-value">${state.tasks.length?Math.round(state.tasks.filter(t=>t.done).length/state.tasks.length*100):0}%</div><div class="kpi-meta">across the team</div></div>
      <div class="kpi"><div class="kpi-label">Direct notes</div><div class="kpi-value">${state.notes.filter(n=>n.visibility==='direct').length}</div><div class="kpi-meta">leadership to team</div></div>
    </div>

    <div class="card">
      <div class="section-head">
        <div><div class="card-title">Team members</div><div class="card-sub">Monitor progress, grant section access, and leave direct notes</div></div>
        <button class="btn btn-primary" onclick="openNewTeamMemberModal()">Add team member</button>
      </div>
      <div style="overflow-x:auto">
        <table class="table">
          <thead>
            <tr><th>Member</th><th>Role</th><th>Permissions</th><th>Progress</th><th>Status</th><th></th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div style="margin-top:14px;font-size:11.5px;color:var(--text-muted)">Tip: click any permission tag to toggle access. Use the topbar user switcher to preview the app as that team member.</div>
    </div>
  `;
}

function togglePerm(uid, perm){
  const u = userById(uid);
  if(!u || u.role==='Owner') return;
  const i = u.permissions.indexOf(perm);
  if(i>=0) u.permissions.splice(i,1); else u.permissions.push(perm);
  renderTeam();
  toast('Permission updated', `${u.name}: ${perm} ${i>=0?'removed':'granted'}`);
}

function writeNoteTo(uid){
  openNewNoteModal(uid);
}

function toggleTask(id){
  const t = state.tasks.find(x=>x.id===id);
  if(!t) return;
  t.done = !t.done;
  renderTasks();
  toast(t.done?'Task completed':'Task reopened', esc(t.title));
}

// ===== CRM =====
function renderCrm(){
  const rows = state.members.map(m=>{
    const tierClass = m.tier==='Platinum'?'':m.tier==='Gold'?'gold':'blue';
    const statusClass = m.status==='Active'?'green':'gold';
    return `
    <tr>
      <td>
        <div class="contact-cell">
          <div class="avatar">${initials(m.name)}</div>
          <div class="info">
            <div class="name">${esc(m.name)}</div>
            <div class="email">${esc(m.email)}</div>
          </div>
        </div>
      </td>
      <td>${esc(m.role)}</td>
      <td>${esc(m.chapter)}</td>
      <td><span class="tag ${tierClass}">${m.tier}</span></td>
      <td><span class="tag ${statusClass}">${m.status}</span></td>
      <td style="color:var(--text-muted)">${fmtDate(m.joined)}</td>
    </tr>`;
  }).join('');

  const counts = {
    Investor: state.members.filter(m=>m.role==='Investor').length,
    Founder: state.members.filter(m=>m.role==='Founder').length,
    Searcher: state.members.filter(m=>m.role==='Searcher').length,
    Mentor: state.members.filter(m=>m.role==='Mentor').length,
  };

  $('#section-crm').innerHTML = `
    <div class="grid grid-4" style="margin-bottom:24px">
      <div class="kpi"><div class="kpi-label">Investors</div><div class="kpi-value">${counts.Investor}</div><div class="kpi-meta">LPs &amp; sponsors</div></div>
      <div class="kpi"><div class="kpi-label">Founders</div><div class="kpi-value">${counts.Founder}</div><div class="kpi-meta">operator cohort</div></div>
      <div class="kpi"><div class="kpi-label">Searchers</div><div class="kpi-value">${counts.Searcher}</div><div class="kpi-meta">active programmes</div></div>
      <div class="kpi"><div class="kpi-label">Mentors</div><div class="kpi-value">${counts.Mentor}</div><div class="kpi-meta">senior advisors</div></div>
    </div>

    <div class="card">
      <div class="section-head">
        <div><div class="card-title">Members directory</div><div class="card-sub">${state.members.length} members across the Cambridge ETA community</div></div>
        <div class="tabs"><div class="tab active">All</div><div class="tab">Active</div><div class="tab">Pending</div></div>
      </div>
      <div style="overflow-x:auto">
        <table class="table">
          <thead>
            <tr><th>Member</th><th>Role</th><th>College</th><th>Tier</th><th>Status</th><th>Joined</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

// ===== MODALS (Add flows) =====
function openNewEventModal(){
  openModal(`
    <h3>Create new event</h3>
    <div class="modal-sub">Add an event to the Cambridge ETA calendar.</div>
    <div class="field"><label>Title</label><input class="input" id="f_title" placeholder="e.g. Spring Investor Drinks"/></div>
    <div class="grid grid-2" style="gap:12px">
      <div class="field"><label>Date</label><input class="input" id="f_date" type="date" value="2026-05-01"/></div>
      <div class="field"><label>Time</label><input class="input" id="f_time" type="time" value="18:30"/></div>
    </div>
    <div class="field"><label>Venue</label><input class="input" id="f_venue" placeholder="e.g. Jesus College, Upper Hall"/></div>
    <div class="field"><label>Description</label><textarea class="input" id="f_desc" rows="3"></textarea></div>
    <div class="grid grid-2" style="gap:12px">
      <div class="field"><label>Capacity</label><input class="input" id="f_cap" type="number" value="60"/></div>
      <div class="field"><label>Status</label><select class="input" id="f_stat"><option>Open</option><option>Nearly Full</option><option>Draft</option></select></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEvent()">Create event</button>
    </div>
  `);
}
function saveEvent(){
  const title = $('#f_title').value.trim();
  if(!title){ toast('Missing title','Please give the event a name'); return; }
  state.events.push({
    id: Date.now(),
    title,
    date: $('#f_date').value,
    time: $('#f_time').value,
    venue: $('#f_venue').value || 'TBC',
    desc: $('#f_desc').value || '',
    attendees: 0,
    capacity: parseInt($('#f_cap').value,10) || 50,
    status: $('#f_stat').value,
  });
  closeModal();
  renderEvents(); renderDashboard();
  toast('Event created', esc(title));
}

function openNewTaskModal(){
  openModal(`

    <div class="modal-sub">Track something the club needs to get done.</div>
    <div class="field"><label>Task</label><input class="input" id="t_title"/></div>

      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Add task</button>

function saveTask(){

function openNewMemberModal(){

    <h3>Add member</h3>
    <div class="modal-sub">Invite a new member to the Cambridge ETA club.</div>
    <div class="field"><label>Full name</label><input class="input" id="m_name"/></div>

function saveMember(){

  if(!name){ toast('Missing name','Enter the member\'s full name'); return; }

    email: $('#m_email').value || (name.toLowerCase().replace(/\s+/g,'.')+'@cambridge-eta.co.uk'),

    chapter: $('#m_college').value || 'Unassigned',
    tier: $('#m_tier').value,

// ===== NOTES MODAL =====
function openNewNoteModal(prefillTargetId){
  const owner = isOwner();
  const visibilityOptions = owner
    ? '<option value="direct">Direct to a team member</option><option value="public">Public (whole team)</option><option value="private">Private (just me)</option>'
    : '<option value="private">Private (just me)</option><option value="public">Public (whole team)</option>';
  const targetOptions = state.users.filter(u=>u.id!==state.currentUserId).map(u=>`<option value="${u.id}" ${prefillTargetId===u.id?'selected':''}>${esc(u.name)} · ${esc(u.role)}</option>`).join('');
  openModal(`
    <h3>New note</h3>
    <div class="modal-sub">Capture a thought, guidance or briefing.</div>
    <div class="field"><label>Visibility</label><select class="input" id="n_vis" onchange="updateNoteVisibility()">${visibilityOptions}</select></div>
    <div class="field" id="n_target_field" style="${owner?'':'display:none'}"><label>Direct to</label><select class="input" id="n_target">${targetOptions}</select></div>
    <div class="field"><label>Title</label><input class="input" id="n_title" placeholder="e.g. Budget review priorities"/></div>
    <div class="field"><label>Content</label><textarea class="input" id="n_content" rows="5" placeholder="Write your note..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNote()">Save note</button>
    </div>
  `);
  updateNoteVisibility();
}
function updateNoteVisibility(){
  const v = $('#n_vis').value;
  $('#n_target_field').style.display = v==='direct' ? 'block' : 'none';
}
function saveNote(){
  const title = $('#n_title').value.trim();
  const content = $('#n_content').value.trim();
  const vis = $('#n_vis').value;
  if(!title || !content){ toast('Missing fields','Please add a title and content'); return; }
  const target = vis==='direct' ? $('#n_target').value : null;
  state.notes.unshift({
    id: 'n'+Date.now(),
    authorId: state.currentUserId,
    targetUserId: target,
    visibility: vis,
    title, content,
    createdAt: new Date().toISOString().slice(0,10),
    pinned: false,
  });
  closeModal();
  if(vis==='direct') notesTab='forme';
  else if(vis==='private') notesTab='mine';
  else notesTab='team';
  renderNotes(); renderDashboard();
  toast('Note saved', vis==='direct' ? `Sent to ${userName(target)}` : vis==='public' ? 'Visible to the whole team' : 'Visible only to you');
}

// ===== TEAM MEMBER MODAL =====
function openNewTeamMemberModal(){
  openModal(`
    <h3>Add team member</h3>
    <div class="modal-sub">Grant someone access to the platform and assign their scope.</div>
    <div class="field"><label>Full name</label><input class="input" id="tm_name"/></div>
    <div class="field"><label>Email</label><input class="input" id="tm_email" type="email"/></div>
    <div class="field"><label>Role</label><input class="input" id="tm_role" placeholder="e.g. Comms Lead"/></div>
    <div class="field"><label>Permissions</label>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">
        ${['dashboard','events','tasks','crm','notes'].map(p=>`
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;cursor:pointer">
            <input type="checkbox" class="tm_perm" value="${p}" ${p==='dashboard'||p==='tasks'||p==='notes'?'checked':''}/>${p}
          </label>
        `).join('')}
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTeamMember()">Add member</button>
    </div>
  `);
}
function saveTeamMember(){
  const name = $('#tm_name').value.trim();
  if(!name){ toast('Missing name','Enter the team member\'s name'); return; }
  const perms = Array.from($$('.tm_perm')).filter(c=>c.checked).map(c=>c.value);
  state.users.push({
    id: 'u'+Date.now(),
    name,
    email: $('#tm_email').value || (name.toLowerCase().replace(/\s+/g,'.')+'@cambridge-eta.co.uk'),
    role: $('#tm_role').value || 'Team Member',
    permissions: perms,
  });
  closeModal();
  renderTeam(); renderUserSwitcher();
  toast('Team member added', esc(name));
}

// ===== THEME =====
function applyTheme(){
  document.documentElement.setAttribute('data-theme', state.theme);
  $('#themeIconDark').style.display = state.theme==='dark' ? 'block' : 'none';
  $('#themeIconLight').style.display = state.theme==='light' ? 'block' : 'none';
}
function toggleTheme(){
  state.theme = state.theme==='dark' ? 'light' : 'dark';
  localStorage.setItem('eta-theme', state.theme);
  applyTheme();
  toast('Theme switched', `Now using ${state.theme} mode`);
}

// ===== USER SWITCHER =====
function renderUserSwitcher(){
  const me = currentUser();
  $('#chipAvatar').textContent = initials(me.name);
  $('#chipName').textContent = me.name;
  $('#chipRole').textContent = me.role;
  const menu = $('#userMenu');
  menu.innerHTML = `
    <div class="user-menu-label">Viewing as</div>
    ${state.users.map(u=>`
      <div class="user-menu-item ${u.id===state.currentUserId?'current':''}" onclick="switchUser('${u.id}')">
        <div class="avatar">${initials(u.name)}</div>
        <div class="info">
          <div class="name">${esc(u.name)}</div>
          <div class="role">${esc(u.role)}</div>
        </div>
        <svg class="check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    `).join('')}
    <div style="padding:10px 12px;border-top:1px solid var(--border);margin-top:6px;font-size:10.5px;color:var(--text-muted)">
      Simulates logging in as that team member. Sections and data filter by their permissions.
    </div>
  `;
}
function toggleUserMenu(e){
  if(e) e.stopPropagation();
  $('#userMenu').classList.toggle('open');
}
function switchUser(uid){
  state.currentUserId = uid;
  localStorage.setItem('eta-user', uid);
  $('#userMenu').classList.remove('open');
  renderUserSwitcher();
  applyPermissions();
  renderDashboard(); renderEvents(); renderTasks(); renderCrm(); renderNotes(); renderTeam();
  const me = currentUser();
  // If the current section isn't allowed, fall back to dashboard
  if(!canAccess(state.section) && state.section!=='dashboard') switchSection('dashboard');
  else switchSection(state.section);
  toast('Switched user', `Now viewing as ${me.name}`);
}
document.addEventListener('click', (e)=>{
  const sw = document.getElementById('userSwitcher');
  if(sw && !sw.contains(e.target)) $('#userMenu').classList.remove('open');
});

// ===== PERMISSIONS: sidebar visibility =====
function applyPermissions(){
  const owner = isOwner();
  document.querySelectorAll('.nav-item').forEach(n=>{
    const nav = n.dataset.nav;
    const ownerOnly = n.hasAttribute('data-owner-only');
    const allowed = canAccess(nav) && (!ownerOnly || owner);
    n.style.display = allowed ? '' : 'none';
  });
}

// ===== ROUTER =====
const SECTION_CONFIG = {
  dashboard: {title:'Dashboard',    subtitle:'Your club at a glance',                  btn:'New Event',  action: openNewEventModal},
  events:    {title:'Events',       subtitle:'Calendar, planning & capacity',          btn:'New Event',  action: openNewEventModal},
  tasks:     {title:'Tasks',        subtitle:'What you are working on',                btn:'New Task',   action: openNewTaskModal},
  crm:       {title:'Members CRM',  subtitle:'Directory of the Cambridge ETA community', btn:'Add Member', action: openNewMemberModal},
  notes:     {title:'Notes',        subtitle:'Private, public & direct notes',         btn:'New Note',   action: ()=>openNewNoteModal()},
  team:      {title:'Team',         subtitle:'Manage permissions and monitor progress',btn:'Add Member', action: openNewTeamMemberModal},
};

function switchSection(name){
  if(!canAccess(name)){ toast('No access', `You do not have permission to view ${name}`); return; }
  if(name==='team' && !isOwner()){ toast('Owner only','Only the Owner can manage the team'); return; }
  state.section = name;
  $$('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.nav===name));
  $$('.section').forEach(s=>s.classList.toggle('active', s.id===`section-${name}`));
  const cfg = SECTION_CONFIG[name];
  $('#pageTitle').textContent = cfg.title;
  $('#pageSubtitle').textContent = cfg.subtitle;
  $('#primaryBtnLabel').textContent = cfg.btn;
  $('#primaryBtn').onclick = cfg.action;
  // re-render for freshness
  if(name==='dashboard') renderDashboard();
  if(name==='events') renderEvents();
  if(name==='tasks') renderTasks();
  if(name==='crm') renderCrm();
  if(name==='notes') renderNotes();
  if(name==='team') renderTeam();
}

$$('.nav-item').forEach(n=>n.addEventListener('click',()=>switchSection(n.dataset.nav)));
$('#themeToggle').addEventListener('click', toggleTheme);

// ===== BOOT =====
applyTheme();
renderUserSwitcher();
applyPermissions();
renderDashboard();
renderEvents();
renderTasks();
renderCrm();
renderNotes();
renderTeam();
switchSection('dashboard');
</script>
</body>
</html>
