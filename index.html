<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cambridge ETA Club Management Platform</title>
<meta name="description" content="Premium club management platform for Cambridge ETA." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#07060d;
  --bg-1:#0b0a17;
  --bg-2:#111029;
  --bg-3:#181635;
  --panel:rgba(20,18,44,0.72);
  --panel-2:rgba(28,25,58,0.78);
  --border:rgba(138,99,255,0.18);
  --border-strong:rgba(138,99,255,0.35);
  --text:#e9e6ff;
  --text-dim:#a39ec7;
  --text-muted:#6e6a90;
  --purple:#8a63ff;
  --purple-2:#a98bff;
  --purple-glow:rgba(138,99,255,0.45);
  --violet:#6a3dff;
  --gold:#e8c66b;
  --green:#4ade80;
  --red:#ff6b8a;
  --blue:#5ec8ff;
  --radius:14px;
  --shadow:0 20px 60px -20px rgba(80,40,200,0.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg-0);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  font-size:14px;
  line-height:1.5;
  transition:background 0.3s ease, color 0.3s ease;
}

/* ===== LIGHT THEME ===== */
[data-theme="light"]{
  --bg-0:#ffffff;
  --bg-1:#ffffff;
  --bg-2:#faf9ff;
  --bg-3:#f3efff;
  --panel:#ffffff;
  --panel-2:#fafaff;
  --border:rgba(106,61,255,0.14);
  --border-strong:rgba(106,61,255,0.32);
  --text:#0f0a2c;
  --text-dim:#4e456d;
  --text-muted:#8a84a8;
  --purple:#6a3dff;
  --purple-2:#8a63ff;
  --purple-glow:rgba(106,61,255,0.35);
  --shadow:0 20px 48px -24px rgba(106,61,255,0.25);
}
[data-theme="light"] body::before{
  background:
    radial-gradient(900px 600px at 12% -10%, rgba(138,99,255,0.08), transparent 60%),
    radial-gradient(800px 500px at 100% 0%, rgba(106,61,255,0.06), transparent 60%),
    radial-gradient(600px 400px at 50% 110%, rgba(168,139,255,0.05), transparent 60%);
}
[data-theme="light"] .sidebar{
  background:linear-gradient(180deg,#ffffff,#fafaff);
  border-right:1px solid rgba(106,61,255,0.1);
}
[data-theme="light"] .topbar{background:rgba(255,255,255,0.85)}
[data-theme="light"] .card,
[data-theme="light"] .kpi,
[data-theme="light"] .event-card{
  background:#ffffff;
  box-shadow:0 1px 2px rgba(106,61,255,0.04),0 8px 24px -16px rgba(106,61,255,0.15);
}
[data-theme="light"] .kpi::after{
  background:radial-gradient(circle,rgba(138,99,255,0.12),transparent 70%);
}
[data-theme="light"] .kpi-value{
  -webkit-text-fill-color:initial;background:none;background-clip:unset;
  color:#1a0e4a;
}
[data-theme="light"] .nav-item{color:#4e456d}
[data-theme="light"] .nav-item:hover{background:rgba(106,61,255,0.06);color:#0f0a2c}
[data-theme="light"] .nav-item.active{
  background:linear-gradient(90deg,rgba(106,61,255,0.12),rgba(106,61,255,0.02));
  color:#0f0a2c;
  box-shadow:inset 0 0 0 1px rgba(106,61,255,0.18);
}
[data-theme="light"] .search,
[data-theme="light"] .icon-btn,
[data-theme="light"] .btn-ghost,
[data-theme="light"] .tabs{
  background:#f4f1ff;border-color:rgba(106,61,255,0.14);
}
[data-theme="light"] .search input{color:#0f0a2c}
[data-theme="light"] .task-row{background:#faf9ff}
[data-theme="light"] .task-row:hover{background:#f3efff}
[data-theme="light"] .user-card{background:#f4f1ff}
[data-theme="light"] .input{background:#ffffff;color:#0f0a2c}
[data-theme="light"] .modal{background:#ffffff}
[data-theme="light"] .toast{background:#ffffff;color:#0f0a2c}
[data-theme="light"] .hero{
  background:linear-gradient(135deg,rgba(138,99,255,0.10),rgba(106,61,255,0.03));
}
[data-theme="light"] .table tbody tr:hover{background:rgba(106,61,255,0.05)}
[data-theme="light"] .donut > div{background:#ffffff !important}
[data-theme="light"] .contact-cell .name,
[data-theme="light"] .task-title,
[data-theme="light"] .event-title,
[data-theme="light"] .card-title,
[data-theme="light"] .brand-text .title,
[data-theme="light"] .user-card .name,
[data-theme="light"] .page-title{color:#0f0a2c}
[data-theme="light"] .content::-webkit-scrollbar-thumb{background:rgba(106,61,255,0.18)}

.sidebar,.topbar,.card,.kpi,.event-card,.task-row,.input,.modal,.btn-ghost,.search,.icon-btn,.tabs{
  transition:background 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(900px 600px at 12% -10%, rgba(138,99,255,0.18), transparent 60%),
    radial-gradient(800px 500px at 100% 0%, rgba(106,61,255,0.14), transparent 60%),
    radial-gradient(600px 400px at 50% 110%, rgba(168,139,255,0.10), transparent 60%);
}
h1,h2,h3,h4{font-family:'Space Grotesk','Inter',sans-serif;letter-spacing:-0.01em;font-weight:600}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}

/* ===== LAYOUT ===== */
.app{display:flex;height:100vh;position:relative;z-index:1}
.sidebar{
  width:260px;flex-shrink:0;
  background:linear-gradient(180deg,rgba(15,13,35,0.92),rgba(10,9,22,0.92));
  backdrop-filter:blur(20px);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:22px 16px;
}
.brand{display:flex;align-items:center;gap:12px;padding:6px 10px 22px}
.brand-mark{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,#8a63ff 0%,#6a3dff 50%,#3a1f9e 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk';font-weight:700;font-size:18px;color:white;
  box-shadow:0 8px 24px -4px rgba(138,99,255,0.5),inset 0 1px 0 rgba(255,255,255,0.3);
  position:relative;
}
.brand-mark::after{content:"";position:absolute;inset:2px;border-radius:10px;border:1px solid rgba(255,255,255,0.15)}
.brand-text{display:flex;flex-direction:column;line-height:1.15}
.brand-text .title{font-family:'Space Grotesk';font-weight:700;font-size:15px;color:#fff}
.brand-text .sub{font-size:10.5px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase}

.nav{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.nav-label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);padding:14px 12px 6px;font-weight:600}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 12px;border-radius:10px;
  color:var(--text-dim);font-size:13.5px;font-weight:500;
  cursor:pointer;transition:all 0.2s ease;
  position:relative;
}
.nav-item:hover{background:rgba(138,99,255,0.08);color:var(--text)}
.nav-item.active{
  background:linear-gradient(90deg,rgba(138,99,255,0.22),rgba(138,99,255,0.06));
  color:#fff;
  box-shadow:inset 0 0 0 1px rgba(138,99,255,0.3);
}
.nav-item.active::before{
  content:"";position:absolute;left:-16px;top:50%;transform:translateY(-50%);
  width:3px;height:22px;border-radius:0 3px 3px 0;
  background:linear-gradient(180deg,#a98bff,#6a3dff);
  box-shadow:0 0 12px var(--purple-glow);
}
.nav-item .icon{width:18px;height:18px;opacity:0.9;flex-shrink:0}
.nav-item .badge{margin-left:auto;background:var(--purple);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}

.sidebar-footer{margin-top:auto;padding-top:18px;border-top:1px solid var(--border)}
.user-card{
  display:flex;align-items:center;gap:12px;padding:10px;border-radius:12px;
  background:rgba(138,99,255,0.06);border:1px solid var(--border);
}
.avatar{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#a98bff,#6a3dff);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;color:#fff;font-size:13px;
}
.user-card .name{font-size:12.5px;font-weight:600;color:#fff}
.user-card .role{font-size:10.5px;color:var(--text-muted)}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{
  height:68px;padding:0 32px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:rgba(11,10,23,0.6);backdrop-filter:blur(16px);
  flex-shrink:0;
}
.page-title{font-size:20px;font-weight:700;font-family:'Space Grotesk'}
.page-subtitle{font-size:12.5px;color:var(--text-muted);margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:12px}
.search{
  display:flex;align-items:center;gap:8px;
  background:rgba(138,99,255,0.08);
  border:1px solid var(--border);
  padding:9px 14px;border-radius:10px;min-width:280px;
}
.search input{background:none;border:none;outline:none;color:var(--text);flex:1;font-size:13px}
.search input::placeholder{color:var(--text-muted)}
.icon-btn{
  width:38px;height:38px;border-radius:10px;
  background:rgba(138,99,255,0.08);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;
  position:relative;
}
.icon-btn:hover{background:rgba(138,99,255,0.18);border-color:var(--border-strong)}
.icon-btn .dot{position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red)}

.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;
  transition:all 0.2s;white-space:nowrap;
}
.btn-primary{
  background:linear-gradient(135deg,#8a63ff,#6a3dff);
  color:#fff;
  box-shadow:0 8px 24px -8px rgba(138,99,255,0.6),inset 0 1px 0 rgba(255,255,255,0.2);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 28px -8px rgba(138,99,255,0.8)}
.btn-ghost{background:rgba(138,99,255,0.08);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:rgba(138,99,255,0.16)}

.content{flex:1;overflow-y:auto;padding:28px 32px 40px}
.content::-webkit-scrollbar{width:10px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:rgba(138,99,255,0.2);border-radius:10px}
.content::-webkit-scrollbar-thumb:hover{background:rgba(138,99,255,0.35)}

.section{display:none;animation:fadeUp 0.35s ease}
.section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ===== CARDS ===== */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:22px;
  backdrop-filter:blur(20px);
  position:relative;
  overflow:hidden;
}
.card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(168,139,255,0.4),transparent);
}
.card-title{font-size:15px;font-weight:600;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--text-muted);margin-bottom:18px}

.grid{display:grid;gap:18px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-2-1{grid-template-columns:2fr 1fr}

/* ===== KPI ===== */
.kpi{
  background:linear-gradient(135deg,rgba(20,18,44,0.85),rgba(28,25,58,0.65));
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;position:relative;overflow:hidden;
}
.kpi::after{
  content:"";position:absolute;top:-40px;right:-40px;width:140px;height:140px;
  background:radial-gradient(circle,rgba(138,99,255,0.22),transparent 70%);
  border-radius:50%;
}
.kpi-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;font-weight:600}
.kpi-value{font-size:32px;font-weight:700;font-family:'Space Grotesk';margin-top:8px;background:linear-gradient(135deg,#fff,#c4b8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.kpi-meta{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:12px;color:var(--text-dim)}
.kpi-trend{display:inline-flex;align-items:center;gap:3px;font-weight:600;padding:2px 8px;border-radius:8px;font-size:11px}
.trend-up{background:rgba(74,222,128,0.12);color:var(--green)}
.trend-down{background:rgba(255,107,138,0.12);color:var(--red)}
.kpi-icon{
  position:absolute;top:18px;right:18px;z-index:1;
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,rgba(138,99,255,0.3),rgba(106,61,255,0.15));
  border:1px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;
}

/* ===== TABLES ===== */
.table{width:100%;border-collapse:collapse}
.table th{
  text-align:left;padding:12px 14px;font-size:11px;font-weight:600;
  color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;
  border-bottom:1px solid var(--border);
}
.table td{padding:14px;font-size:13px;border-bottom:1px solid rgba(138,99,255,0.08)}
.table tr{transition:background 0.15s}
.table tbody tr:hover{background:rgba(138,99,255,0.06)}
.table tr:last-child td{border-bottom:none}

.tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;
  background:rgba(138,99,255,0.14);color:var(--purple-2);
  border:1px solid rgba(138,99,255,0.25);
}
.tag.green{background:rgba(74,222,128,0.12);color:var(--green);border-color:rgba(74,222,128,0.3)}
.tag.gold{background:rgba(232,198,107,0.12);color:var(--gold);border-color:rgba(232,198,107,0.3)}
.tag.red{background:rgba(255,107,138,0.12);color:var(--red);border-color:rgba(255,107,138,0.3)}
.tag.blue{background:rgba(94,200,255,0.12);color:var(--blue);border-color:rgba(94,200,255,0.3)}

.contact-cell{display:flex;align-items:center;gap:11px}
.contact-cell .avatar{width:34px;height:34px;font-size:12px;border-radius:9px}
.contact-cell .info{display:flex;flex-direction:column}
.contact-cell .name{font-weight:600;color:#fff;font-size:13px}
.contact-cell .email{font-size:11.5px;color:var(--text-muted)}

/* ===== EVENTS ===== */
.event-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;
  position:relative;overflow:hidden;transition:all 0.25s;
}
.event-card:hover{transform:translateY(-2px);border-color:var(--border-strong);box-shadow:var(--shadow)}
.event-card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#8a63ff,#a98bff,#6a3dff);
}
.event-date{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
  font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;
}
.event-title{font-size:17px;font-weight:700;font-family:'Space Grotesk';margin-bottom:8px}
.event-desc{font-size:12.5px;color:var(--text-dim);line-height:1.55;margin-bottom:16px}
.event-foot{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--border)}
.attendees{display:flex;align-items:center}
.attendees .avatar{width:26px;height:26px;font-size:10px;border-radius:7px;border:2px solid var(--bg-1);margin-left:-8px}
.attendees .avatar:first-child{margin-left:0}
.attendees .more{margin-left:-8px;width:26px;height:26px;border-radius:7px;border:2px solid var(--bg-1);background:rgba(138,99,255,0.2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--purple-2)}

/* ===== TASKS ===== */
.task-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;border-radius:10px;
  background:rgba(138,99,255,0.04);border:1px solid var(--border);
  margin-bottom:10px;transition:all 0.2s;
}
.task-row:hover{background:rgba(138,99,255,0.09);border-color:var(--border-strong)}
.task-row.done{opacity:0.55}
.task-row.done .task-title{text-decoration:line-through}
.checkbox{
  width:20px;height:20px;border-radius:6px;flex-shrink:0;
  border:1.5px solid rgba(138,99,255,0.4);
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;
}
.checkbox:hover{border-color:var(--purple-2)}
.checkbox.checked{background:linear-gradient(135deg,#8a63ff,#6a3dff);border-color:#8a63ff}
.checkbox.checked::after{content:"";width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) translate(-1px,-1px)}
.task-info{flex:1;min-width:0}
.task-title{font-size:13.5px;font-weight:600;color:#fff}
.task-meta{font-size:11.5px;color:var(--text-muted);margin-top:3px;display:flex;gap:12px;align-items:center}

/* ===== FORMS & MODAL ===== */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;font-weight:600}
.input,select.input,textarea.input{
  width:100%;padding:11px 14px;border-radius:10px;
  background:rgba(10,9,22,0.6);border:1px solid var(--border);
  color:var(--text);font-size:13px;outline:none;transition:all 0.2s;
}
.input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(138,99,255,0.18)}

.modal-back{
  position:fixed;inset:0;background:rgba(5,4,15,0.75);backdrop-filter:blur(8px);
  z-index:100;display:none;align-items:center;justify-content:center;padding:20px;
}
.modal-back.open{display:flex;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:linear-gradient(180deg,#13112b,#0d0c1f);
  border:1px solid var(--border-strong);
  border-radius:18px;padding:28px;width:100%;max-width:500px;
  box-shadow:var(--shadow);position:relative;
  max-height:90vh;overflow-y:auto;
}
.modal h3{font-size:18px;margin-bottom:6px}
.modal-sub{font-size:12.5px;color:var(--text-muted);margin-bottom:22px}
.modal-close{position:absolute;top:18px;right:18px;width:32px;height:32px;border-radius:8px;background:rgba(138,99,255,0.1)}
.modal-close:hover{background:rgba(138,99,255,0.2)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;padding-top:18px;border-top:1px solid var(--border)}

/* ===== CHARTS ===== */
.bar-chart{display:flex;align-items:flex-end;gap:10px;height:180px;padding:10px 0}
.bar{
  flex:1;border-radius:6px 6px 0 0;
  background:linear-gradient(180deg,#a98bff,#6a3dff);
  position:relative;min-height:6px;
  transition:all 0.3s;
}
.bar:hover{filter:brightness(1.2)}
.bar-label{position:absolute;bottom:-22px;left:0;right:0;text-align:center;font-size:10.5px;color:var(--text-muted)}
.bar-value{position:absolute;top:-20px;left:0;right:0;text-align:center;font-size:10.5px;color:var(--purple-2);font-weight:600}

.donut{position:relative;width:180px;height:180px;margin:0 auto}
.legend{display:flex;flex-direction:column;gap:8px;margin-top:18px}
.legend-item{display:flex;align-items:center;gap:10px;font-size:12px}
.legend-dot{width:10px;height:10px;border-radius:3px}

/* ===== MISC ===== */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:200;
  background:linear-gradient(135deg,#1a1638,#0f0c26);
  border:1px solid var(--border-strong);border-radius:12px;
  padding:14px 18px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:12px;
  transform:translateX(400px);transition:transform 0.3s ease;
  max-width:340px;
}
.toast.show{transform:translateX(0)}
.toast-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#8a63ff,#6a3dff);display:flex;align-items:center;justify-content:center;flex-shrink:0}

.empty{padding:40px 20px;text-align:center;color:var(--text-muted);font-size:13px}

.hero{
  background:linear-gradient(135deg,rgba(138,99,255,0.14),rgba(106,61,255,0.06));
  border:1px solid var(--border-strong);
  border-radius:18px;padding:28px 32px;margin-bottom:24px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:"";position:absolute;top:-60px;right:-60px;width:260px;height:260px;
  background:radial-gradient(circle,rgba(168,139,255,0.28),transparent 65%);border-radius:50%;
}
.hero h1{font-size:26px;font-family:'Space Grotesk';margin-bottom:6px;position:relative}
.hero p{font-size:13px;color:var(--text-dim);max-width:560px;position:relative}
.hero-actions{display:flex;gap:10px;margin-top:18px;position:relative}

.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.section-head h2{font-size:17px}
.tabs{display:flex;gap:4px;background:rgba(138,99,255,0.06);padding:4px;border-radius:10px;border:1px solid var(--border)}
.tab{padding:8px 14px;border-radius:7px;font-size:12px;font-weight:600;color:var(--text-dim);cursor:pointer;transition:all 0.2s}
.tab.active{background:linear-gradient(135deg,#8a63ff,#6a3dff);color:#fff;box-shadow:0 4px 12px -4px rgba(138,99,255,0.6)}

/* ===== USER SWITCHER ===== */
.user-switcher{position:relative}
.user-chip{
  display:flex;align-items:center;gap:10px;
  padding:6px 12px 6px 6px;border-radius:10px;
  background:rgba(138,99,255,0.08);border:1px solid var(--border);
  transition:all 0.2s;max-width:200px;
}
.user-chip:hover{background:rgba(138,99,255,0.16);border-color:var(--border-strong)}
.user-chip .avatar{width:30px;height:30px;font-size:11px;border-radius:8px;flex-shrink:0}
.chip-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.chip-role{font-size:10px;color:var(--text-muted);white-space:nowrap}
.user-menu{
  position:absolute;top:calc(100% + 8px);right:0;min-width:280px;z-index:50;
  background:linear-gradient(180deg,#13112b,#0d0c1f);
  border:1px solid var(--border-strong);border-radius:12px;
  box-shadow:var(--shadow);
  padding:8px;display:none;
}
[data-theme="light"] .user-menu{background:#ffffff}
.user-menu.open{display:block;animation:fadeUp 0.2s ease}
.user-menu-label{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);padding:10px 12px 6px;font-weight:600}
.user-menu-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:8px;cursor:pointer;transition:background 0.15s;
}
.user-menu-item:hover{background:rgba(138,99,255,0.1)}
.user-menu-item .avatar{width:32px;height:32px;font-size:11px;border-radius:8px}
.user-menu-item .info{flex:1;min-width:0}
.user-menu-item .name{font-size:12.5px;font-weight:600;color:var(--text)}
.user-menu-item .role{font-size:10.5px;color:var(--text-muted)}
.user-menu-item.current{background:linear-gradient(90deg,rgba(138,99,255,0.18),rgba(138,99,255,0.04))}
.user-menu-item .check{color:var(--purple-2);opacity:0;transition:opacity 0.2s}
.user-menu-item.current .check{opacity:1}

/* ===== NOTES ===== */
.note-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 20px;
  position:relative;transition:all 0.2s;
}
.note-card:hover{border-color:var(--border-strong);transform:translateY(-1px);box-shadow:var(--shadow)}
.note-card.direct{border-left:3px solid #a98bff}
.note-card.private{border-left:3px solid var(--gold)}
.note-card.public{border-left:3px solid var(--green)}
.note-card.pinned::after{
  content:"";position:absolute;top:14px;right:16px;width:8px;height:8px;border-radius:50%;
  background:linear-gradient(135deg,#a98bff,#6a3dff);box-shadow:0 0 10px var(--purple-glow);
}
.note-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.note-head .avatar{width:28px;height:28px;font-size:10px;border-radius:7px}
.note-author{font-size:12px;font-weight:600;color:var(--text)}
.note-meta{font-size:11px;color:var(--text-muted);margin-left:auto}
.note-title{font-size:14.5px;font-weight:700;margin-bottom:8px;font-family:'Space Grotesk';color:var(--text)}
.note-body{font-size:12.5px;color:var(--text-dim);line-height:1.6;white-space:pre-wrap}
.note-foot{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}

/* ===== TEAM PROGRESS ===== */
.progress-bar{
  height:6px;background:rgba(138,99,255,0.12);border-radius:6px;overflow:hidden;flex:1;
}
.progress-fill{
  height:100%;background:linear-gradient(90deg,#a98bff,#6a3dff);
  border-radius:6px;transition:width 0.6s ease;
  box-shadow:0 0 12px rgba(138,99,255,0.4);
}
.team-row{
  display:flex;align-items:center;gap:16px;padding:14px 0;
  border-bottom:1px solid var(--border);
}
.team-row:last-child{border-bottom:none}

/* ===== AI CHAT DRAWER ===== */
.ai-btn{
  position:relative;
  background:linear-gradient(135deg,rgba(138,99,255,0.25),rgba(106,61,255,0.12));
  border:1px solid rgba(138,99,255,0.4);
  color:var(--text);
}
.ai-btn::after{
  content:"";position:absolute;inset:-2px;border-radius:12px;
  background:linear-gradient(135deg,rgba(168,139,255,0.4),transparent 70%);
  opacity:0;transition:opacity 0.25s;pointer-events:none;
}
.ai-btn:hover::after{opacity:1}
.ai-drawer-back{
  position:fixed;inset:0;z-index:150;display:none;
  background:rgba(5,4,15,0.45);backdrop-filter:blur(4px);
}
.ai-drawer-back.open{display:block;animation:fadeIn 0.25s ease}
[data-theme="light"] .ai-drawer-back{background:rgba(30,18,70,0.22)}
.ai-drawer{
  position:fixed;top:0;right:0;bottom:0;width:420px;max-width:100%;z-index:160;
  display:flex;flex-direction:column;
  background:linear-gradient(180deg,#13112b,#0c0b20);
  border-left:1px solid var(--border-strong);
  transform:translateX(110%);transition:transform 0.35s cubic-bezier(0.22,0.61,0.36,1);
  box-shadow:-40px 0 80px -20px rgba(80,40,200,0.45);
}
[data-theme="light"] .ai-drawer{
  background:#ffffff;
  border-left:1px solid rgba(106,61,255,0.18);
  box-shadow:-40px 0 60px -20px rgba(106,61,255,0.25);
}
.ai-drawer.open{transform:translateX(0)}
.ai-drawer-head{
  display:flex;align-items:center;gap:12px;
  padding:20px 22px;border-bottom:1px solid var(--border);
}
.ai-drawer-head .avatar{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,#a98bff,#6a3dff);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 20px -6px rgba(138,99,255,0.6);
  flex-shrink:0;
}
.ai-drawer-head .title{font-size:14.5px;font-weight:700;font-family:'Space Grotesk';color:var(--text)}
.ai-drawer-head .sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.ai-drawer-head .close{margin-left:auto}
.ai-messages{
  flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:14px;
  scroll-behavior:smooth;
}
.ai-messages::-webkit-scrollbar{width:8px}
.ai-messages::-webkit-scrollbar-thumb{background:rgba(138,99,255,0.2);border-radius:8px}
.ai-msg{display:flex;gap:10px;max-width:90%}
.ai-msg.user{align-self:flex-end;flex-direction:row-reverse}
.ai-msg .bubble{
  padding:11px 14px;border-radius:14px;font-size:13px;line-height:1.55;
  white-space:pre-wrap;word-wrap:break-word;
}
.ai-msg.assistant .bubble{
  background:rgba(138,99,255,0.10);
  border:1px solid rgba(138,99,255,0.22);
  color:var(--text);
  border-top-left-radius:4px;
}
[data-theme="light"] .ai-msg.assistant .bubble{
  background:#f4f1ff;border-color:rgba(106,61,255,0.16);color:#0f0a2c;
}
.ai-msg.user .bubble{
  background:linear-gradient(135deg,#8a63ff,#6a3dff);
  color:#ffffff;
  border-top-right-radius:4px;
  box-shadow:0 8px 20px -8px rgba(138,99,255,0.5);
}
.ai-msg .avatar{
  width:28px;height:28px;border-radius:8px;flex-shrink:0;
  font-size:10px;font-weight:700;color:#ffffff;
  display:flex;align-items:center;justify-content:center;
}
.ai-msg.assistant .avatar{background:linear-gradient(135deg,#a98bff,#6a3dff)}
.ai-msg.user .avatar{background:rgba(138,99,255,0.25);color:var(--text);border:1px solid var(--border-strong)}
.ai-tool-chip{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:20px;
  background:rgba(74,222,128,0.12);color:var(--green);
  border:1px solid rgba(74,222,128,0.3);
  margin:6px 0 0;
}
.ai-tool-chip.err{background:rgba(255,107,138,0.12);color:var(--red);border-color:rgba(255,107,138,0.3)}
.ai-typing{display:flex;gap:5px;padding:6px 0}
.ai-typing span{
  width:7px;height:7px;border-radius:50%;background:var(--purple-2);
  animation:pulse 1.4s infinite ease-in-out both;
}
.ai-typing span:nth-child(2){animation-delay:0.16s}
.ai-typing span:nth-child(3){animation-delay:0.32s}
@keyframes pulse{0%,80%,100%{opacity:0.25;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
.ai-composer{
  padding:16px 18px 18px;border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:10px;
}
.ai-composer textarea{
  width:100%;resize:none;min-height:44px;max-height:140px;
  padding:12px 14px;border-radius:12px;font-family:inherit;font-size:13px;
  background:rgba(10,9,22,0.55);
  border:1px solid var(--border);
  color:var(--text);outline:none;transition:all 0.2s;
}
.ai-composer textarea:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(138,99,255,0.18)}
[data-theme="light"] .ai-composer textarea{background:#faf9ff;color:#0f0a2c}
.ai-composer-row{display:flex;align-items:center;gap:10px;justify-content:space-between}
.ai-suggestions{display:flex;gap:6px;flex-wrap:wrap}
.ai-suggestion{
  font-size:10.5px;padding:6px 10px;border-radius:20px;
  background:rgba(138,99,255,0.08);border:1px solid var(--border);
  color:var(--text-dim);cursor:pointer;transition:all 0.15s;
}
.ai-suggestion:hover{background:rgba(138,99,255,0.16);border-color:var(--border-strong);color:var(--text)}
.ai-send{
  width:40px;height:40px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#8a63ff,#6a3dff);
  color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 20px -8px rgba(138,99,255,0.6);cursor:pointer;
  transition:all 0.15s;
}
.ai-send:hover{transform:translateY(-1px)}
.ai-send:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.ai-setup{
  padding:22px;border:1px solid var(--border-strong);border-radius:14px;
  background:rgba(138,99,255,0.08);margin:22px;
}
[data-theme="light"] .ai-setup{background:#f4f1ff}
.ai-setup h4{font-size:14px;margin-bottom:6px;color:var(--text)}
.ai-setup p{font-size:12px;color:var(--text-dim);line-height:1.55;margin-bottom:14px}
.ai-setup .input{margin-bottom:10px}
.ai-setup a{color:var(--purple-2);text-decoration:underline}

@media (max-width:1100px){
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .grid-3{grid-template-columns:repeat(2,1fr)}
  .grid-2-1{grid-template-columns:1fr}
  .sidebar{width:72px}
  .brand-text,.nav-label,.nav-item span:not(.badge),.user-card .info{display:none}
  .nav-item{justify-content:center}
  .search{min-width:160px}
}
</style>
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div class="brand">
    <div class="brand-mark">E</div>
    <div class="brand-text">
      <div class="title">Cambridge ETA</div>
      <div class="sub">Club Platform</div>
    </div>
  </div>

  <div class="nav-label">Workspace</div>
  <div class="nav">
    <div class="nav-item active" data-nav="dashboard">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
      <span>Dashboard</span>
    </div>
    <div class="nav-item" data-nav="events">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Events</span>
      <span class="badge">4</span>
    </div>
    <div class="nav-item" data-nav="tasks">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>Tasks</span>
    </div>
    <div class="nav-item" data-nav="crm">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Members CRM</span>
    </div>
    <div class="nav-item" data-nav="notes">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>Notes</span>
      <span class="badge" id="notesBadge" style="display:none">0</span>
    </div>
    <div class="nav-item" data-nav="team" data-owner-only>
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="11" r="4"/><path d="M22 11l-3 3-1.5-1.5"/><path d="M19 3a3 3 0 0 1 0 6"/></svg>
      <span>Team</span>
    </div>
  </div>

  <div class="sidebar-footer">
    <div class="user-card">
      <div class="avatar">TI</div>
      <div class="info">
        <div class="name">Taslim Iya</div>
        <div class="role">Club President</div>
      </div>
    </div>
  </div>
</aside>

<main class="main">
  <header class="topbar">
    <div>
      <div class="page-title" id="pageTitle">Dashboard</div>
      <div class="page-subtitle" id="pageSubtitle">Your club at a glance</div>
    </div>
    <div class="topbar-right">
      <div class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search members, events, tasks..." />
      </div>
      <div class="user-switcher" id="userSwitcher">
        <button class="user-chip" onclick="toggleUserMenu(event)">
          <div class="avatar" id="chipAvatar">TI</div>
          <div style="text-align:left;min-width:0">
            <div class="chip-name" id="chipName">Taslim Iya</div>
            <div class="chip-role" id="chipRole">Owner</div>
          </div>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;opacity:0.6"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="user-menu" id="userMenu"></div>
      </div>
      <button class="icon-btn ai-btn" title="Ask the AI assistant" id="aiBtn">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.09 5.26L20 8l-4.5 3.5L17 18l-5-3-5 3 1.5-6.5L4 8l5.91-.74L12 2z"/></svg>
      </button>
      <button class="icon-btn" title="Toggle theme" id="themeToggle">
        <svg id="themeIconDark" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="themeIconLight" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="icon-btn" title="Notifications">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="dot"></span>
      </button>
      <button class="btn btn-primary" id="primaryBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span id="primaryBtnLabel">New Event</span>
      </button>
    </div>
  </header>

  <div class="content">
    <section class="section active" id="section-dashboard"></section>
    <section class="section" id="section-events"></section>
    <section class="section" id="section-tasks"></section>
    <section class="section" id="section-crm"></section>
    <section class="section" id="section-notes"></section>
    <section class="section" id="section-team"></section>
  </div>
</main>

</div>

<div class="modal-back" id="modalBack">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- AI chat drawer -->
<div class="ai-drawer-back" id="aiDrawerBack" onclick="closeAiDrawer()"></div>
<aside class="ai-drawer" id="aiDrawer" aria-hidden="true">
  <div class="ai-drawer-head">
    <div class="avatar">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.09 5.26L20 8l-4.5 3.5L17 18l-5-3-5 3 1.5-6.5L4 8l5.91-.74L12 2z"/></svg>
    </div>
    <div>
      <div class="title">AI assistant</div>
      <div class="sub">Powered by Claude Sonnet 4.6</div>
    </div>
    <button class="icon-btn close" onclick="closeAiDrawer()" title="Close">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="ai-messages" id="aiMessages"></div>
  <div class="ai-composer">
    <div class="ai-suggestions" id="aiSuggestions"></div>

<script>
// ===== STATE =====
// ===== LOCAL STORAGE "SUPABASE" SHIM =====
// This app runs entirely in the browser. There is no backend, no auth.
// We expose a small query builder that matches the subset of the
// Supabase JS API used by the rest of the code so every existing
// save/update/delete site keeps working without changes.

const LOCAL_DATA_KEY = 'eta-local-data-v1';
const LOCAL_OWNER_ID = 'local-owner';

function _loadLocal(){
  try {
    const raw = localStorage.getItem(LOCAL_DATA_KEY);
    if(raw) return JSON.parse(raw);
  } catch(e){}
  // First run: seed with a single Owner so profile-dependent features work.
  const seed = {
    eta_users: [{
      id: LOCAL_OWNER_ID,
      email: 'owner@local',
      name: 'Owner',
      role: 'Owner',
      permissions: ['*'],
      created_at: new Date().toISOString(),
    }],
    eta_events:  [],
    eta_tasks:   [],
    eta_members: [],
    eta_notes:   [],
  };
  localStorage.setItem(LOCAL_DATA_KEY, JSON.stringify(seed));
  return seed;
}
function _saveLocal(data){
  localStorage.setItem(LOCAL_DATA_KEY, JSON.stringify(data));
}
function _genId(){
  return 'loc_' + Math.random().toString(36).slice(2, 11) + Date.now().toString(36);
}

class LocalQuery {
  constructor(table){
    this.table = table;
    this.op = null;
    this.payload = null;
    this.patch = null;
    this.filters = [];
    this.orderBy = null;
    this.limitN = null;
    this.single_ = false;
  }
  select(){ if(!this.op) this.op = 'select'; return this; }
  insert(payload){ this.op = 'insert'; this.payload = payload; return this; }
  update(patch){ this.op = 'update'; this.patch = patch; return this; }
  delete(){ this.op = 'delete'; return this; }
  eq(col, val){ this.filters.push({col, val}); return this; }
  order(col, opts){ this.orderBy = {col, opts: opts || {}}; return this; }
  limit(n){ this.limitN = n; return this; }
  single(){ this.single_ = true; return this; }
  then(onResolve, onReject){
    return Promise.resolve().then(() => this._run()).then(onResolve, onReject);
  }
  _matches(row){
    return this.filters.every(f => row[f.col] === f.val);
  }
  _run(){
    const data = _loadLocal();
    const rows = data[this.table] || [];
    try {
      if(this.op === 'select' || this.op === null){
        let result = rows.filter(r => this._matches(r));
        if(this.orderBy){
          const {col, opts} = this.orderBy;
          const asc = opts.ascending !== false;
          result = result.slice().sort((a,b) => {
            const av = a[col], bv = b[col];
            if(av == null && bv == null) return 0;
            if(av == null) return 1;
            if(bv == null) return -1;
            if(av === bv) return 0;
            return asc ? (av > bv ? 1 : -1) : (av > bv ? -1 : 1);
          });
        }
        if(this.limitN != null) result = result.slice(0, this.limitN);
        if(this.single_) return { data: result[0] || null, error: null };
        return { data: result, error: null };
      }
      if(this.op === 'insert'){
        const list = Array.isArray(this.payload) ? this.payload : [this.payload];
        const inserted = list.map(p => ({
          id: p.id || _genId(),
          created_at: new Date().toISOString(),
          ...p,
        }));
        data[this.table] = [...rows, ...inserted];
        _saveLocal(data);
        if(this.single_) return { data: inserted[0], error: null };
        return { data: inserted, error: null };
      }
      if(this.op === 'update'){
        const updated = [];
        const newRows = rows.map(r => {
          if(this._matches(r)){
            const u = { ...r, ...this.patch };
            updated.push(u);
            return u;
          }
          return r;
        });
        data[this.table] = newRows;
        _saveLocal(data);
        if(this.single_) return { data: updated[0] || null, error: null };
        return { data: updated, error: null };
      }
      if(this.op === 'delete'){
        data[this.table] = rows.filter(r => !this._matches(r));
        _saveLocal(data);
        return { data: null, error: null };
      }
      return { data: null, error: null };
    } catch(e){
      return { data: null, error: { message: e.message || String(e) } };
    }
  }
}

const sb = {
  from(table){ return new LocalQuery(table); }
};

const state = {
  section: 'dashboard',
  theme: localStorage.getItem('eta-theme') || 'dark',
  profile: null,   // the hardcoded local Owner
  users:   [],
  events:  [],
  tasks:   [],
  members: [],
  notes:   [],
};

// ===== HELPERS =====
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const fmtDate = (s) => {
  const d = new Date(s);
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
};
const shortDate = (s) => {
  const d = new Date(s);
  return {day:d.getDate(), month:d.toLocaleDateString('en-GB',{month:'short'}).toUpperCase(), weekday:d.toLocaleDateString('en-GB',{weekday:'short'}).toUpperCase()};
};
const initials = (n) => n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const esc = (s) => String(s).replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

// ===== USERS / PERMISSIONS =====
function currentUser(){ return state.profile; }
function currentUserId(){ return state.profile ? state.profile.id : null; }
function isOwner(){ return state.profile && state.profile.role === 'Owner'; }
function userById(id){ return state.users.find(u => u.id === id); }
function userName(id){ const u = userById(id); return u ? u.name : 'Unassigned'; }
function canAccess(section){
  const u = state.profile;
  if(!u) return false;
  if(Array.isArray(u.permissions) && (u.permissions.includes('*') || u.permissions.includes(section))) return true;
  return false;
}
function visibleTasks(){
  // RLS already restricts what we can fetch; this is just a belt-and-braces filter.
  if(isOwner()) return state.tasks;
  return state.tasks.filter(t => t.assigneeId === currentUserId());
}
function notesForMe(){
  const me = currentUserId();
  return state.notes.filter(n => n.visibility === 'direct' && n.targetUserId === me);
}
function notesMyOwn(){
  return state.notes.filter(n => n.authorId === currentUserId());
}
function notesTeamPublic(){
  return state.notes.filter(n => n.visibility === 'public');
}

// ===== DB -> JS SHAPE =====
function mapUser(u){ return u; } // shapes already match
function mapEvent(e){
  return { ...e, date: e.event_date, time: e.event_time || '', desc: e.description || '' };
}
function mapTask(t){
  return { ...t, due: t.due_date, assigneeId: t.assignee_id };
}
function mapMember(m){ return m; } // shapes already match
function mapNote(n){
  return { ...n, authorId: n.author_id, targetUserId: n.target_user_id, createdAt: n.created_at };
}

function toast(title, msg){
  $('#toastTitle').textContent = title;
  $('#toastMsg').textContent = msg;
  const t = $('#toast'); t.classList.add('show');
  clearTimeout(window._tt); window._tt = setTimeout(()=>t.classList.remove('show'), 2600);
}

function openModal(html){ $('#modalBody').innerHTML = html; $('#modalBack').classList.add('open'); }
function closeModal(){ $('#modalBack').classList.remove('open'); }
$('#modalBack').addEventListener('click', e=>{ if(e.target.id==='modalBack') closeModal(); });

// ===== ICONS =====
const ICONS = {
  users: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a98bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  cal: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a98bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  check: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a98bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>',
  trend: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a98bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',
};
</script>

  const recentMembers = [...state.members].slice(-4).reverse();

  const now = new Date();
  const chartData = [];
  for(let i=6; i>=0; i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);

    const count = state.members.filter(m => {
      if(!m.joined) return false;
      const j = new Date(m.joined);
      return j <= new Date(d.getFullYear(), d.getMonth()+1, 0);

    chartData.push({label, v:count});
  }
  const max = Math.max(1, ...chartData.map(d=>d.v));
  const bars = chartData.map(d=>`
    <div class="bar" style="height:${max ? (d.v/max)*100 : 0}%">

    const pct = (v/tierTotal)*100;
    const s = `${k}|${acc}|${acc+pct}|${tierColors[k] || 'var(--purple)'}`;
    acc += pct; return s;

          <div style="font-size:12px;color:var(--text-dim);min-width:90px;text-align:right">${doneCount}/${theirs.length} tasks</div>
          <span class="tag ${pct>=75?'green':pct>=40?'gold':'red'}">${pct}%</span>

  $('#section-dashboard').innerHTML = `

      <h1>Welcome back, ${esc(firstName)}</h1>

        ${owner ? '<button class="btn btn-primary" onclick="switchSection(\'events\')">Plan an event</button><button class="btn btn-ghost" onclick="switchSection(\'team\')">Manage team</button>' : '<button class="btn btn-primary" onclick="switchSection(\'tasks\')">View my tasks</button><button class="btn btn-ghost" onclick="switchSection(\'notes\')">Read notes</button>'}
      </div>
    </div>

    <div class="grid grid-4" style="margin-bottom:24px">
      <div class="kpi">
        <div class="kpi-icon">${ICONS.users}</div>
        <div class="kpi-label">Total Members</div>
        <div class="kpi-value">${totalMembers}</div>
        <div class="kpi-meta"><span class="kpi-trend trend-up">+12%</span> vs last term</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">${ICONS.check}</div>
        <div class="kpi-label">Active</div>
        <div class="kpi-value">${activeMembers}</div>
        <div class="kpi-meta"><span class="kpi-trend trend-up">+4</span> this month</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">${ICONS.cal}</div>

      <div class="kpi">
        <div class="kpi-icon">${ICONS.trend}</div>

        <div class="kpi-meta"><span class="kpi-trend trend-up">+6%</span> event attendance</div>

    </div>

    ${teamProgress}

    <div class="grid grid-2-1" style="margin-bottom:24px">
      <div class="card">

          <div>
            <div class="card-title">Membership growth</div>

            <div style="font-size:10.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em">Members</div>
          </div>
        </div>
        <div class="legend">
          ${tierTotal === 0
            ? '<div class="legend-item" style="color:var(--text-muted);font-size:11.5px">No members yet — add your first one from the Members CRM.</div>'
            : Object.entries(tierCounts).map(([k,v])=>`

<script>
// ===== TASKS =====
function renderTasks(){
  const owner = isOwner();
  const scope = visibleTasks();
  const pending = scope.filter(t=>!t.done);
  const done = scope.filter(t=>t.done);
  const highP = pending.filter(t=>t.priority==='High').length;

  const taskRow = (t) => {
    const prioClass = t.priority==='High'?'red':t.priority==='Medium'?'gold':'blue';
    return `
    <div class="task-row ${t.done?'done':''}">
      <div class="checkbox ${t.done?'checked':''}" onclick="toggleTask('${t.id}')"></div>
      <div class="task-info">

        <div class="task-meta">

function renderTeam(){

    const isO = u.role==='Owner';

        const has = u.permissions.includes(p);

async function togglePerm(uid, perm){
  const u = userById(uid);
  if(!u || u.role==='Owner') return;
  const nextPerms = u.permissions.includes(perm)
    ? u.permissions.filter(p => p !== perm)
    : [...u.permissions, perm];
  const { error } = await sb.from('eta_users').update({ permissions: nextPerms }).eq('id', uid);
  if(error){ toast('Could not update', error.message); return; }
  u.permissions = nextPerms;
  renderTeam();
  toast('Permission updated', `${u.name}: ${perm} ${u.permissions.includes(perm)?'granted':'removed'}`);
}

function writeNoteTo(uid){
  openNewNoteModal(uid);
}

async function toggleTask(id){
  const t = state.tasks.find(x => x.id === id);
  if(!t) return;
  const next = !t.done;
  const { error } = await sb.from('eta_tasks').update({ done: next }).eq('id', id);
  if(error){ toast('Could not update task', error.message); return; }
  t.done = next;
  renderTasks();
  renderDashboard();
  toast(next?'Task completed':'Task reopened', t.title);
}

async function saveNote(){
  const title = $('#n_title').value.trim();
  const content = $('#n_content').value.trim();
  const vis = $('#n_vis').value;
  if(!title || !content){ toast('Missing fields','Please add a title and content'); return; }
  const target = vis==='direct' ? $('#n_target').value : null;
  const payload = {
    author_id: currentUserId(),
    target_user_id: target,

    content,

async function saveTeamMember(){

    name,

async function updateUserRole(uid, nextRole){

// ===== DATA LOADING (local storage) =====
async function loadAll(){
  const [users, events, tasks, members, notes] = await Promise.all([
    sb.from('eta_users').select('*').order('created_at', {ascending:true}),
    sb.from('eta_events').select('*').order('event_date', {ascending:true}),
    sb.from('eta_tasks').select('*').order('due_date', {ascending:true, nullsFirst:false}),
    sb.from('eta_members').select('*').order('created_at', {ascending:false}),
    sb.from('eta_notes').select('*').order('created_at', {ascending:false}),
  ]);
  state.users   = (users.data   || []).map(mapUser);
  state.events  = (events.data  || []).map(mapEvent);
  state.tasks   = (tasks.data   || []).map(mapTask);
  state.members = (members.data || []).map(mapMember);
  state.notes   = (notes.data   || []).map(mapNote);
  // Hardcoded local Owner. Seeded by _loadLocal() on first run.
  state.profile = state.users.find(u => u.id === LOCAL_OWNER_ID) || state.users[0] || null;
}

async function bootApp(){
  try { await loadAll(); } catch(e){ console.error('loadAll failed:', e); }
  renderUserMenu();
  applyPermissions();
  renderDashboard();
  renderEvents();
  renderTasks();
  renderCrm();
  renderNotes();
  renderTeam();
  const target = canAccess(state.section) ? state.section : 'dashboard';
  switchSection(target);
}

function aiSystemPrompt(){
  const today = new Date().toISOString().slice(0,10);
  const me = currentUser();
  const team = state.users.map(u =>
    `- ${u.name} <${u.email}> · role=${u.role} · permissions=[${(u.permissions||[]).join(', ')}]`
  ).join('\n');
  const ownerNote = isOwner()
    ? 'The current user is the Owner, so you may call update_team_member.'
    : 'The current user is NOT the Owner. Do not call update_team_member.';
  return `You are the AI assistant for the Cambridge ETA Club Management Platform.

You help ${me.name} (${me.role}) run the club by creating events, tasks, notes, members, and updating team settings through the tools provided.

Today is ${today}.
${ownerNote}

Current operational team (app users):
${team || '(only the current user so far)'}

Rules:
- When the user asks for something, pick the right tool and call it directly. Don't narrate the steps.
- Resolve people by name to their email from the team list above. If ambiguous, ask a single short clarifying question.
- For relative dates (tomorrow, Friday, next week, "in two weeks"), compute the concrete YYYY-MM-DD.
- If a required field is missing and you can't reasonably infer it, ask one concise question.
- After a tool succeeds, confirm briefly in one sentence. No bullet lists, no restating everything.
- Never invent people, emails, colleges or dates. If you don't know, ask.
- Be confident and concise — this is a management tool, not casual chat.`;
}

async function callClaude(apiKey, messages){
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: AI_MODEL,
      max_tokens: 1024,
      system: aiSystemPrompt(),
      tools: AI_TOOLS,
      messages,
    })
  });
  if(!res.ok){
    const text = await res.text();
    throw new Error(`Claude API ${res.status}: ${text.slice(0,200)}`);
  }
  return await res.json();
}

// ===== TOOL IMPLEMENTATIONS =====
function aiUserByEmail(email){
  if(!email) return null;
  return state.users.find(u => (u.email || '').toLowerCase() === email.toLowerCase());
}

async function toolCreateTask(input){
  const assignee = input.assignee_email ? aiUserByEmail(input.assignee_email) : currentUser();
  if(input.assignee_email && !assignee) return { error: `No team member with email ${input.assignee_email}.` };
  const payload = {
    title: input.title,
    due_date: input.due_date || null,
    priority: input.priority || 'Medium',
    assignee_id: assignee ? assignee.id : currentUserId(),
    project: input.project || null,
    done: false,
    created_by: currentUserId(),
  };
  const { data, error } = await sb.from('eta_tasks').insert(payload).select().single();
  if(error) return { error: error.message };
  state.tasks.push(mapTask(data));
  renderTasks(); renderDashboard();
  return { ok: `Created task "${input.title}" assigned to ${assignee ? assignee.name : 'you'}.` };
}

async function toolCreateEvent(input){
  const payload = {
    title: input.title,
    event_date: input.date,
    event_time: input.time || null,
    venue: input.venue || null,
    description: input.description || null,
    capacity: input.capacity || 50,
    attendees: 0,
    status: 'Open',
    created_by: currentUserId(),
  };
  const { data, error } = await sb.from('eta_events').insert(payload).select().single();
  if(error) return { error: error.message };
  state.events.push(mapEvent(data));
  renderEvents(); renderDashboard();
  return { ok: `Scheduled "${input.title}" for ${input.date}${input.time?' at '+input.time:''}.` };
}

async function toolAddClubMember(input){
  const payload = {
    name: input.name,
    email: input.email || null,
    role: input.role || null,
    chapter: input.chapter || null,
    tier: input.tier || 'Silver',
    status: input.status || 'Active',
    created_by: currentUserId(),
  };
  const { data, error } = await sb.from('eta_members').insert(payload).select().single();
  if(error) return { error: error.message };
  state.members.push(mapMember(data));
  renderCrm(); renderDashboard();
  return { ok: `Added ${input.name} to the members directory.` };
}

async function toolWriteNote(input){
  let target = null;
  if(input.visibility === 'direct'){
    if(!input.target_email) return { error: 'Direct notes require target_email.' };
    target = aiUserByEmail(input.target_email);
    if(!target) return { error: `No team member with email ${input.target_email}.` };
  }
  const payload = {
    author_id: currentUserId(),
    target_user_id: target ? target.id : null,
    visibility: input.visibility,
    title: input.title,
    content: input.content,
    pinned: false,
  };
  const { data, error } = await sb.from('eta_notes').insert(payload).select().single();
  if(error) return { error: error.message };
  state.notes.unshift(mapNote(data));
  renderNotes(); renderDashboard();
  const audience = input.visibility === 'direct' ? `to ${target.name}` :
                   input.visibility === 'public' ? 'to the whole team' :
                   'as a private note';
  return { ok: `Saved "${input.title}" ${audience}.` };
}

async function toolUpdateTeamMember(input){
  if(!isOwner()) return { error: 'Only the Owner can update team members.' };
  const target = aiUserByEmail(input.target_email);
  if(!target) return { error: `No team member with email ${input.target_email}.` };
  const patch = {};
  if(input.new_role) patch.role = input.new_role;
  if(Array.isArray(input.permissions)) patch.permissions = input.permissions;
  if(!Object.keys(patch).length) return { error: 'Nothing to update.' };
  const { error } = await sb.from('eta_users').update(patch).eq('id', target.id);
  if(error) return { error: error.message };
  Object.assign(target, patch);
  renderTeam();
  const bits = [];
  if(patch.role) bits.push(`role → ${patch.role}`);
  if(patch.permissions) bits.push(`permissions → [${patch.permissions.join(', ')}]`);
  return { ok: `Updated ${target.name}: ${bits.join(', ')}.` };
}

function toolListTeam(){
  const rows = state.users.map(u =>
    `${u.name} <${u.email}> · ${u.role} · [${(u.permissions||[]).join(', ')}]`
  );
  return { ok: rows.join('\n') };
}

async function executeTool(name, input){
  try {
    switch(name){
      case 'create_task':        return await toolCreateTask(input);
      case 'create_event':       return await toolCreateEvent(input);
      case 'add_club_member':    return await toolAddClubMember(input);
      case 'write_note':         return await toolWriteNote(input);
      case 'update_team_member': return await toolUpdateTeamMember(input);
      case 'list_team':          return toolListTeam();
      default:                   return { error: `Unknown tool ${name}` };
    }
  } catch(e){
    return { error: e.message || String(e) };
  }
}

  container.appendChild(wrap);

async function sendAiMessage(){
  if(aiState.busy) return;
  const input = $('#aiInput');
  const text = input.value.trim();
  if(!text) return;
  const key = localStorage.getItem(AI_STORAGE_KEY);
  if(!key){ renderAiSetup(); return; }
  input.value = '';
  $('#aiSuggestions').innerHTML = '';
  addAiMsg('user', text);
  aiState.history.push({ role: 'user', content: [{ type: 'text', text }] });
  aiState.busy = true;
  $('#aiSend').disabled = true;
  addAiTyping();

  try {
    let iterations = 0;
    while(iterations < 6){
      iterations++;
      const response = await callClaude(key, aiState.history);
      removeAiTyping();
      const assistantContent = response.content || [];
      aiState.history.push({ role: 'assistant', content: assistantContent });

      // Emit any natural-language text blocks
      for(const block of assistantContent){
        if(block.type === 'text' && block.text.trim()){
          addAiMsg('assistant', block.text.trim());
        }
      }

      if(response.stop_reason !== 'tool_use') break;

      // Execute all tool_use blocks and send results back
      const toolResults = [];
      for(const block of assistantContent){
        if(block.type !== 'tool_use') continue;
        const result = await executeTool(block.name, block.input || {});
        const chipHtml = result.error
          ? `<div class="ai-tool-chip err">⚠ ${esc(block.name)}: ${esc(result.error)}</div>`
          : `<div class="ai-tool-chip">✓ ${esc(block.name)}</div>`;
        // Show a chip under the last assistant bubble
        const lastBubble = $('#aiMessages').querySelector('.ai-msg.assistant:last-child .bubble');
        if(lastBubble){
          const span = document.createElement('div');
          span.innerHTML = chipHtml;
          lastBubble.appendChild(span.firstChild);
        } else {
          addAiMsg('assistant', '', chipHtml);
        }
        toolResults.push({
          type: 'tool_result',
          tool_use_id: block.id,
          content: result.error ? `ERROR: ${result.error}` : `OK: ${result.ok}`,
          is_error: !!result.error,
        });
      }
      aiState.history.push({ role: 'user', content: toolResults });
      addAiTyping();
    }
  } catch(e){
    removeAiTyping();
    addAiMsg('assistant', `Sorry — I ran into an error: ${e.message || e}`);
  }

  aiState.busy = false;
  $('#aiSend').disabled = false;
}

// ===== BOOT =====
applyTheme();
bootApp();
</script>
</body>
</html>
